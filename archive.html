<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Архив задач — СкладСборка</title>

  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: #0b0f14;
      color: #fff;
    }

    .container {
      max-width: 1100px;
      margin: 24px auto 60px;
      padding: 0 16px;
    }

    h1 { margin: 0 0 16px; }

    .topbar {
      display:flex;
      justify-content: space-between;
      align-items:center;
      margin-bottom: 16px;
    }

    a.btn {
      background:#1e293b;
      border:1px solid #334155;
      color:#fff;
      padding:10px 12px;
      border-radius:10px;
      text-decoration:none;
      font-weight:600;
    }

    .card {
      background:#0d1422;
      border:1px solid #1f2a44;
      border-radius:14px;
      padding:12px;
      margin-bottom:12px;
    }

    .row {
      display:flex;
      justify-content: space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .title {
      font-weight:700;
      font-size:16px;
    }

    .muted {
      color:#9ca3af;
      font-size:13px;
    }

    .badge {
      font-size:12px;
      padding:4px 8px;
      border-radius:999px;
      border:1px solid #334155;
      background:#0b1220;
    }

    .status-assigned { border-color:#60a5fa; }
    .status-done { border-color:#22c55e; }
    .status-pending { border-color:#f59e0b; }

    .items {
      margin-top:8px;
      font-size:13px;
      color:#cbd5e1;
    }

    .small {
      font-size:12px;
      color:#94a3b8;
    }

    button {
      background:#0b1220;
      border:1px solid #334155;
      color:#fff;
      padding:6px 10px;
      border-radius:8px;
      cursor:pointer;
    }

    .details {
      margin-top:10px;
      padding-top:10px;
      border-top:1px solid #1f2a44;
      display:none;
    }

    .file {
      font-size:12px;
      color:#93c5fd;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="topbar">
      <h1>📦 Архив задач</h1>
      <a class="btn" href="index.html">← Назад</a>
    </div>

    <div id="list"></div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      query,
      orderBy,
      limit
    } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyAH58ZpWAp64mhM589KD6jXHcOlPqU0aYU",
      authDomain: "skladsborka-6c2a7.firebaseapp.com",
      projectId: "skladsborka-6c2a7",
      storageBucket: "skladsborka-6c2a7.appspot.com",
      messagingSenderId: "516526717198"
    };

    const app = initializeApp(FIREBASE_CONFIG);
    const db = getFirestore(app);
    const auth = getAuth(app);

    await signInAnonymously(auth);

    const list = document.getElementById('list');

    function badge(status){
      const cls =
        status === "done" ? "status-done" :
        status === "pending" ? "status-pending" :
        "status-assigned";

      return <span class="badge ${cls}">${status || "unknown"}</span>;
    }

    function renderTask(doc){
      const d = doc.data();

      const itemsCount = (d.items || []).length;
      const filesCount = (d.files || []).length;

      const assignees = (d.assigneeNames  []).join(", ")  "—";

      const created = d.createdAt?.toDate?.()
        ? d.createdAt.toDate().toLocaleString()
        : "—";

      const id = doc.id;

      const div = document.createElement('div');
      div.className = "card";

      div.innerHTML = `
        <div class="row">
          <div>
            <div class="title">${d.title || "Без названия"}</div>
            <div class="small">ID: ${id}</div>
          </div>
          <div>${badge(d.status)}</div>
        </div>
[07.05.2026 15:53] Глеб: <div class="items">
          👤 ${assignees} <br/>
          📦 Позиции: ${itemsCount} • 📁 Файлы: ${filesCount}
        </div>

        <div class="muted">Создано: ${created}</div>

        <button style="margin-top:8px" onclick="this.nextElementSibling.style.display =
          this.nextElementSibling.style.display === 'block' ? 'none' : 'block'">
          Подробнее
        </button>

        <div class="details">
          <div class="muted">Комментарий:</div>
          <div>${d.comment || "—"}</div>

          <div class="muted" style="margin-top:8px">Позиции:</div>
          <pre class="small">${JSON.stringify(d.items || [], null, 2)}</pre>

          <div class="muted">Файлы:</div>
          ${(d.files || []).map(f => <div class="file">• ${f.name}</div>).join("")}
        </div>
      `;

      list.appendChild(div);
    }

    async function load(){
      list.innerHTML = "Загрузка...";

      const q = query(
        collection(db, "tasks"),
        orderBy("createdAt", "desc"),
        limit(100)
      );

      const snap = await getDocs(q);

      list.innerHTML = "";

      if (snap.empty) {
        list.innerHTML = "<div class='card'>Архив пуст</div>";
        return;
      }

      snap.forEach(renderTask);
    }

    load();
  </script>
</body>
</html>
