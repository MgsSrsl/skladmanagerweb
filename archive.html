<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Архив задач — СкладСборка</title>

  <style>
    body {
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto;
      background:#0b0f14;
      color:#fff;
    }

    .container {
      max-width:1100px;
      margin:24px auto;
      padding:0 16px;
    }

    h1 { margin:0 0 16px; }

    .card {
      background:#0d1422;
      border:1px solid #1f2a44;
      border-radius:14px;
      padding:12px;
      margin-bottom:12px;
    }

    .top {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:16px;
    }

    a {
      color:#fff;
      text-decoration:none;
      background:#1e293b;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #334155;
    }

    .title { font-weight:700; font-size:16px; }

    .muted { color:#9ca3af; font-size:13px; }

    .row {
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .badge {
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      border:1px solid #334155;
      background:#0b1220;
    }

    .items {
      margin-top:8px;
      font-size:13px;
      color:#cbd5e1;
    }

    button {
      margin-top:8px;
      background:#0b1220;
      border:1px solid #334155;
      color:#fff;
      padding:6px 10px;
      border-radius:8px;
      cursor:pointer;
    }

    pre {
      font-size:12px;
      background:#0b1220;
      padding:8px;
      border-radius:10px;
      overflow:auto;
    }
  </style>
</head>

<body>
<div class="container">

  <div class="top">
    <h1>📦 Архив задач</h1>
    <a href="index.html">← Назад</a>
  </div>

  <div id="list">Загрузка...</div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    getDocs
  } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

  import {
    getAuth,
    signInAnonymously
  } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyAH58ZpWAp64mhM589KD6jXHcOlPqU0aYU",
    authDomain: "skladsborka-6c2a7.firebaseapp.com",
    projectId: "skladsborka-6c2a7",
    storageBucket: "skladsborka-6c2a7.firebasestorage.app",
    appId: "1:516526717198:android:e470c17aed370572757f5f"
  };

  const app = initializeApp(FIREBASE_CONFIG);
  const db = getFirestore(app);
  const auth = getAuth(app);

  await signInAnonymously(auth);

  const list = document.getElementById("list");

  function renderTask(id, data) {
    const div = document.createElement("div");
    div.className = "card";

    const items = data.items || [];
    const files = data.files || [];

    div.innerHTML = 
      <div class="row">
        <div>
          <div class="title">${data.title || "Без названия"}</div>
          <div class="muted">ID: ${id}</div>
        </div>
        <div class="badge">${data.status || "unknown"}</div>
      </div>

      <div class="items">
        👤 ${(data.assigneeNames || []).join(", ") || "—"}<br>
        📦 Позиций: ${items.length} • 📁 Файлов: ${files.length}
      </div>

      <div class="muted">Комментарий: ${data.comment || "—"}</div>

      <button onclick="this.nextElementSibling.style.display =
        this.nextElementSibling.style.display === 'block' ? 'none' : 'block'">
        Подробнее
      </button>

      <div style="display:none">
        <pre>${JSON.stringify(items, null, 2)}</pre>
      </div>
    ;

    list.appendChild(div);
  }

  async function load() {
    try {
      const snap = await getDocs(collection(db, "tasks"));

      list.innerHTML = "";

      if (snap.empty) {
        list.innerHTML = "<div class='card'>Архив пуст</div>";
        return;
      }

      const docs = [];
      snap.forEach(d => docs.push({ id: d.id, data: d.data() }));
      // безопасная сортировка (без createdAt orderBy)
      docs.sort((a, b) => {
        const ta = a.data.createdAt?.seconds || 0;
        const tb = b.data.createdAt?.seconds || 0;
        return tb - ta;
      });

      docs.forEach(d => renderTask(d.id, d.data));

    } catch (e) {
      console.error(e);
      list.innerHTML = 
        <div class="card">
          ❌ Ошибка загрузки<br><br>
          ${e.message}
        </div>
      ;
    }
  }

  load();
</script>

</body>
</html>
