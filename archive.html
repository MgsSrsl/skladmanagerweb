<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Архив задач</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f10;
      color: #fff;
    }

    header {
      padding: 14px;
      font-size: 18px;
      font-weight: bold;
      border-bottom: 1px solid #2a2a2a;
    }

    .logs {
      font-size: 12px;
      padding: 10px;
      color: #aaa;
      border-bottom: 1px solid #222;
      white-space: pre-wrap;
    }

    .container {
      padding: 12px;
    }

    .day {
      background: #1a1a1d;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .day-header {
      padding: 10px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
    }

    .tasks {
      display: none;
      border-top: 1px solid #2a2a2a;
    }

    .task {
      padding: 10px;
      border-bottom: 1px solid #2a2a2a;
      font-size: 14px;
    }

    .task small {
      color: #777;
    }

    .empty {
      color: #777;
      padding: 10px;
    }
  </style>
</head>

<body>

<header>📦 Архив задач</header>

<div class="logs" id="logs">Loading...</div>
<div class="container" id="app"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  // 🔥 ТВОЙ FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyAH58ZpWAp64mhM589KD6jXHcOlPqU0aYU",
    authDomain: "skladsborka-6c2a7.firebaseapp.com",
    projectId: "skladsborka-6c2a7",
    storageBucket: "skladsborka-6c2a7.firebasestorage.app",
    appId: "1:516526717198:android:e470c17aed370572757f5f"
  };

  // ☁️ Cloudinary (пока просто хранится, не мешает)
  const CLOUDINARY_CLOUD_NAME    = "dnx1taqp7";
  const CLOUDINARY_UPLOAD_PRESET = "unsigned_tasks";
  const FOLDER_PREFIX            = "tasks";

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const logs = document.getElementById("logs");
  const root = document.getElementById("app");

  function log(msg) {
    console.log(msg);
    logs.innerText += "\n" + msg;
  }

  window.toggle = (el) => {
    const t = el.nextElementSibling;
    t.style.display = t.style.display === "block" ? "none" : "block";
  };

  async function load() {
    try {
      log("🚀 START");
      log("PROJECT: " + firebaseConfig.projectId);

      const archivesRef = collection(db, "archives");
      const snap = await getDocs(archivesRef);

      log("📁 archives count: " + snap.size);

      if (snap.empty) {
        log("❌ archives EMPTY (либо не тот проект, либо нет данных)");
        root.innerHTML = "<div class='empty'>Архив пуст</div>";
        return;
      }

      for (const docSnap of snap.docs) {
        const date = docSnap.id;

        log("📅 date: " + date);

        const tasksRef = collection(db, "archives", date, "tasks");
        const tasksSnap = await getDocs(tasksRef);

        log("   tasks: " + tasksSnap.size);

        const tasksHtml = [];

        tasksSnap.forEach(t => {
          const d = t.data();
          log("      task: " + t.id);

          tasksHtml.push(`
            <div class="task">
              ${d.title || "Без названия"}<br/>
              <small>${t.id}</small>
            </div>
          `);
        });

        root.innerHTML += `
          <div class="day">
            <div class="day-header" onclick="toggle(this)">
              <span>${date}</span>
              <span>▼</span>
            </div>
            <div class="tasks">
              ${tasksHtml.length ? tasksHtml.join("") : "<div class='empty'>Нет задач</div>"}
            </div>
          </div>
        `;
      }

      log("✅ DONE");

    } catch (e) {
      log("🔥 ERROR: " + e.message);
    }
  }

  load();
</script>

</body>
</html>
