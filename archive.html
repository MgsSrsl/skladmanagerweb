
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Archive + Task Details</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f10;
      color: #fff;
    }

    header {
      padding: 14px;
      font-weight: bold;
      border-bottom: 1px solid #2a2a2a;
    }

    .day {
      margin: 10px;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
      background: #1a1a1d;
    }

    .day-header {
      padding: 10px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      background: #151518;
    }

    .task {
      padding: 10px;
      border-bottom: 1px solid #2a2a2a;
      font-size: 13px;
      cursor: pointer;
    }

    .task:hover {
      background: #222;
    }

    .task small {
      display: block;
      color: #777;
      margin-top: 4px;
    }

    .tasks {
      display: none;
    }

    /* MODAL */

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    .modal-content {
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow: auto;
      background: #1a1a1d;
      border-radius: 12px;
      padding: 15px;
      border: 1px solid #333;
    }

    .close {
      float: right;
      cursor: pointer;
      color: #ff4d4d;
      font-size: 20px;
      font-weight: bold;
    }

    .section {
      margin-top: 10px;
      padding: 10px;
      background: #151518;
      border-radius: 8px;
    }

    img {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 5px;
    }

    .comment {
      padding: 6px;
      border-bottom: 1px solid #2a2a2a;
      font-size: 12px;
    }

    pre {
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* LOADER */

    .loader-wrap{
      position:fixed;
      inset:0;

      z-index:9999;

      display:flex;
      align-items:center;
      justify-content:center;

      background:#0f0f10;

      transition:.3s ease;
    }

    .loader-wrap.hide{
      opacity:0;
      pointer-events:none;
    }

    .loader-box{
      text-align:center;
    }

    .loader-spinner{
      width:72px;
      height:72px;

      border-radius:50%;

      border:5px solid rgba(255,255,255,.08);
      border-top:5px solid #ff3b30;

      animation:spin .85s linear infinite;

      margin:0 auto 18px;
    }

    .loader-title{
      font-size:22px;
      font-weight:800;
    }

    .loader-sub{
      margin-top:8px;
      color:#888;
      font-size:14px;
    }

    @keyframes spin{
      from{
        transform:rotate(0deg);
      }
      to{
        transform:rotate(360deg);
      }
    }

  </style>
</head>

<body>

<div id="loader" class="loader-wrap">
  <div class="loader-box">

    <div class="loader-spinner"></div>

    <div class="loader-title">
      Загружаем архив
    </div>

    <div class="loader-sub">
      Получаем задачи из Firebase...
    </div>

  </div>
</div>

<header>📦 ARCHIVE + TASK DETAILS</header>

<div id="app"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <div id="modalBody">loading...</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

  import {
    getFirestore,
    collectionGroup,
    getDocs
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAH58ZP...",
    authDomain: "skladsborka-6c2a7.firebaseapp.com",
    projectId: "skladsborka-6c2a7",
    storageBucket: "skladsborka-6c2a7.firebasestorage.app",
    appId: "1:516526717198:android:e470c17aed370572757f5f"
  };

  const appFirebase = initializeApp(firebaseConfig);
  const db = getFirestore(appFirebase);

  const appDiv = document.getElementById("app");
  const modal = document.getElementById("modal");
  const modalBody = document.getElementById("modalBody");
  const loader = document.getElementById("loader");

  window.closeModal = () => {
    modal.style.display = "none";
  };

  window.openTask = (task) => {

    modal.style.display = "flex";

    const d = task.data;

    // FILES
    let filesHtml = "";

    if (d.files && Array.isArray(d.files)) {

      d.files.forEach(f => {

        const url = f.url || f;

        filesHtml += `
          <div style="margin-top:10px">
            <img src="${url}" />
            <div style="margin-top:5px">
              <a href="${url}" target="_blank" style="color:#4da3ff">
                Открыть файл
              </a>
            </div>
          </div>
        `;
      });
    }

    // COMMENTS
    let commentsHtml = "";

    if (d.comments && Array.isArray(d.comments)) {

      d.comments.forEach(c => {

        commentsHtml += `
          <div class="comment">
            ${c.text || c}
          </div>
        `;
      });
    }

    modalBody.innerHTML = `
      <h3>${d.title || "Без названия"}</h3>

      <div class="section">
        <b>ID:</b> ${task.id}
      </div>

      <div class="section">
        <b>Описание:</b><br/>
        ${d.description || d.comment || "нет"}
      </div>

      <div class="section">
        <b>Файлы:</b><br/>
        ${filesHtml || "нет файлов"}
      </div>

      <div class="section">
        <b>Комментарии:</b><br/>
        ${commentsHtml || "нет комментариев"}
      </div>

      <div class="section">
        <b>RAW DATA:</b>
        <pre>${JSON.stringify(d, null, 2)}</pre>
      </div>
    `;
  };

  async function load() {

    appDiv.innerHTML = "";

    const snap = await getDocs(
      collectionGroup(db, "tasks")
    );

    const groups = {};

    snap.forEach(doc => {

      const data = doc.data();

      const date =
        data.date ||
        (
          data.createdAt?.seconds
            ? new Date(
                data.createdAt.seconds * 1000
              ).toISOString().slice(0,10)
            : "Без даты"
        );

      if (!groups[date]) {
        groups[date] = [];
      }

      groups[date].push({
        id: doc.id,
        data
      });
    });

    Object.keys(groups)
      .sort((a,b)=> b.localeCompare(a))
      .forEach(date => {

      let html = "";

      groups[date].forEach(t => {

        html += `
          <div
            class="task"
            onclick='openTask(${JSON.stringify(t)})'
          >
            ${t.data.title || "Без названия"}

            <small>${t.id}</small>
          </div>
        `;
      });

      appDiv.innerHTML += `
        <div class="day">

          <div
            class="day-header"
            onclick="
              this.nextElementSibling.style.display =
              this.nextElementSibling.style.display === 'block'
              ? 'none'
              : 'block'
            "
          >

            <span>${date}</span>

            <span>
              ${groups[date].length}
            </span>

          </div>

          <div class="tasks">
            ${html}
          </div>

        </div>
      `;
    });

    setTimeout(() => {
      loader.classList.add("hide");
    }, 400);
  }

  load();
</script>

</body>
</html>
