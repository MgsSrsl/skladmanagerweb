<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Архив задач — СкладСборка</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root{
      --bg:#0b0f14;
      --card:#111827;
      --card2:#0f1724;
      --line:#1f2937;
      --text:#f3f4f6;
      --muted:#94a3b8;

      --brand:#ef4444;
      --brand2:#dc2626;

      --green:#22c55e;
      --yellow:#f59e0b;
      --blue:#3b82f6;

      --shadow:0 10px 30px rgba(0,0,0,.35);
      --radius:22px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background: radial-gradient(circle at top,#1a2233 0%,#0b0f14 40%);
      color:var(--text);
      font-family:Inter,Arial,sans-serif;
      min-height:100vh;
    }

    /* ===== LOADER (ADDED ONLY THIS) ===== */
    .loaderOverlay{
      position:fixed;
      inset:0;
      background:rgba(11,15,20,.85);
      backdrop-filter:blur(10px);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:9999;
      transition:.25s ease;
    }

    .loaderBox{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
    }

    .spinner{
      width:52px;
      height:52px;
      border-radius:50%;
      border:3px solid rgba(255,255,255,.12);
      border-top:3px solid var(--brand);
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      0%{ transform:rotate(0deg); }
      100%{ transform:rotate(360deg); }
    }

    .loaderText{
      color:#cbd5e1;
      font-size:14px;
      letter-spacing:.3px;
    }

    .loaderHide{
      opacity:0;
      pointer-events:none;
    }
    /* ===== END LOADER ===== */

    header{
      position:sticky;
      top:0;
      z-index:50;
      backdrop-filter: blur(16px);
      background:rgba(11,15,20,.72);
      border-bottom:1px solid rgba(255,255,255,.06);
      padding:18px 20px;
    }

    .topbar{
      max-width:1400px;
      margin:auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .titleWrap{ display:flex; flex-direction:column; gap:4px; }
    .title{ font-size:24px; font-weight:800; letter-spacing:.3px; }
    .subtitle{ color:var(--muted); font-size:13px; }

    .stats{ display:flex; gap:10px; flex-wrap:wrap; }

    .pill{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      padding:10px 14px;
      border-radius:999px;
      font-size:13px;
      color:#dbeafe;
    }

    .container{
      max-width:1400px;
      margin:auto;
      padding:20px;
    }

    .toolbar{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .search{ flex:1; min-width:260px; position:relative; }

    .search input{
      width:100%;
      border:none;
      outline:none;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      padding:14px 18px;
      border-radius:18px;
      font-size:14px;
    }

    .search input::placeholder{ color:#64748b; }

    .glass{
      background:rgba(17,24,39,.72);
      border:1px solid rgba(255,255,255,.07);
      backdrop-filter:blur(16px);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .day{ overflow:hidden; margin-bottom:18px; }

    .day-header{
      padding:18px 20px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      transition:.18s;
    }

    .day-header:hover{ background:rgba(255,255,255,.03); }

    .day-left{ display:flex; align-items:center; gap:14px; }

    .calendar{
      width:48px; height:48px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      font-size:20px;
      font-weight:700;
    }

    .day-title{ font-size:18px; font-weight:700; }
    .day-sub{ margin-top:4px; color:var(--muted); font-size:13px; }

    .count{
      background:rgba(239,68,68,.15);
      color:#fecaca;
      border:1px solid rgba(239,68,68,.25);
      padding:8px 14px;
      border-radius:999px;
      font-weight:700;
    }

    .tasks{ display:none; padding:0 14px 14px; }

    .tasks.open{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
      gap:14px;
    }

    .task{
      background:linear-gradient(180deg,#131d2c 0%, #0f1724 100%);
      border:1px solid rgba(255,255,255,.06);
      border-radius:22px;
      padding:18px;
      cursor:pointer;
      transition:.18s;
      overflow:hidden;
    }

    .task:hover{
      transform:translateY(-3px);
      border-color:rgba(255,255,255,.12);
    }

    .empty{ text-align:center; padding:80px 20px; color:#64748b; }
  </style>
</head>

<body>

<!-- ===== LOADER (ADDED ONLY THIS) ===== -->
<div id="loader" class="loaderOverlay">
  <div class="loaderBox">
    <div class="spinner"></div>
    <div class="loaderText">Загрузка архива...</div>
  </div>
</div>
<!-- ===== END LOADER ===== -->

<header>
  <div class="topbar">
    <div class="titleWrap">
      <div class="title">📦 Архив задач</div>
      <div class="subtitle">Firebase Archive Viewer • Cloudinary • Комментарии</div>
    </div>

    <div class="stats">
      <div class="pill" id="totalDays">Дней: 0</div>
      <div class="pill" id="totalTasks">Задач: 0</div>
    </div>
  </div>
</header>

<div class="container">
  <div class="toolbar">
    <div class="search">
      <input id="search" placeholder="Поиск по названию, ID, описанию..." />
    </div>
  </div>

  <div id="app"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <button class="close" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collectionGroup, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const appFirebase = initializeApp({
  apiKey: "AIzaSyAH58Zp...",
  authDomain: "skladsborka-6c2a7.firebaseapp.com",
  projectId: "skladsborka-6c2a7"
});

const db = getFirestore(appFirebase);

const loader = document.getElementById("loader");

function hideLoader(){
  loader.classList.add("loaderHide");
  setTimeout(()=> loader.style.display="none", 300);
}

const app = document.getElementById("app");

function render(groups){
  app.innerHTML = "";
  const dates = Object.keys(groups || {});
  document.getElementById("totalDays").textContent = "Дней: " + dates.length;
  document.getElementById("totalTasks").textContent = "Задач: " + dates.reduce((a,d)=>a+(groups[d].length||0),0);

  if(!dates.length){
    app.innerHTML = `<div class="empty">Архив пуст</div>`;
  }
}

async function load(){
  try{
    const snap = await getDocs(collectionGroup(db,"tasks"));
    const groups = {};

    snap.forEach(d=>{
      const data = d.data();
      const date = data.date || "Без даты";
      if(!groups[date]) groups[date] = [];
      groups[date].push({id:d.id, data});
    });

    render(groups);

  } finally {
    hideLoader(); // <-- ВАЖНО: только это добавлено
  }
}

load();

</script>

</body>
</html>
