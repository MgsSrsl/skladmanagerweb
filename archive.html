<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Архив задач</title>

  <style>
    body{
      margin:0;
      font-family:system-ui;
      background:#0b0f14;
      color:#fff;
    }

    .container{
      max-width:1100px;
      margin:24px auto;
      padding:0 16px;
    }

    h1{ margin:0 0 16px; }

    .card{
      background:#0d1422;
      border:1px solid #1f2a44;
      border-radius:14px;
      padding:12px;
      margin-bottom:12px;
    }

    .title{ font-weight:700; }
    .muted{ color:#9ca3af; font-size:13px; }

    .row{
      display:flex;
      justify-content:space-between;
      gap:10px;
    }

    .badge{
      font-size:12px;
      padding:4px 8px;
      border-radius:999px;
      border:1px solid #334155;
      background:#0b1220;
    }

    .items{
      margin-top:8px;
      font-size:13px;
      color:#cbd5e1;
    }

    a.back{
      display:inline-block;
      margin-bottom:12px;
      text-decoration:none;
      color:#fff;
      background:#1e293b;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #334155;
    }

    .day{
      margin:18px 0 6px;
      color:#60a5fa;
      font-weight:700;
    }
  </style>
</head>

<body>
<div class="container">

  <h1>📦 Архив задач</h1>
  <a class="back" href="index.html">← назад</a>

  <div id="list">Загрузка...</div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    getDocs
  } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

  import {
    getAuth,
    signInAnonymously
  } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAH58ZpWAp64mhM589KD6jXHcOlPqU0aYU",
    authDomain: "skladsborka-6c2a7.firebaseapp.com",
    projectId: "skladsborka-6c2a7",
    storageBucket: "skladsborka-6c2a7.firebasestorage.app",
    appId: "1:516526717198:android:e470c17aed370572757f5f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  await signInAnonymously(auth);

  const list = document.getElementById("list");

  function renderTask(date, id, data){
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="row">
        <div>
          <div class="title">${data.title || "Без названия"}</div>
          <div class="muted">ID: ${id}</div>
        </div>
        <div class="badge">${data.status || "unknown"}</div>
      </div>

      <div class="items">
        👤 ${(data.assigneeNames || []).join(", ") || "—"}<br>
        📦 ${(data.items || []).length} позиций
      </div>

      <div class="muted">${data.comment || ""}</div>
    `;

    list.appendChild(div);
  }

  async function load(){
    list.innerHTML = "";

    const archivesSnap = await getDocs(collection(db, "archives"));

    if (archivesSnap.empty){
      list.innerHTML = "<div class='card'>Архив пуст</div>";
      return;
    }

    let total = 0;

    // сортируем дни по убыванию
    const days = archivesSnap.docs.map(d => d.id).sort().reverse();

    for (const day of days){

      const dayHeader = document.createElement("div");
      dayHeader.className = "day";
      dayHeader.textContent = day;
      list.appendChild(dayHeader);

      const tasksSnap = await getDocs(
        collection(db, "archives", day, "tasks")
      );

      if (tasksSnap.empty) continue;

      tasksSnap.forEach(t=>{
        total++;
        renderTask(day, t.id, t.data());
      });
    }

    if (!total){
      list.innerHTML = "<div class='card'>Архив пуст</div>";
    }
  }

  load();
</script>

</body>
</html>
