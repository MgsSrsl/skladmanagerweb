
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Архив — СкладСборка</title>

  <style>
    *{
      box-sizing:border-box;
    }

    :root{
      --bg:#0f0f10;
      --card:#17181c;
      --card2:#1d1f24;
      --line:#2a2d34;
      --text:#ffffff;
      --muted:#90939c;
      --red:#ff3b30;
    }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Inter,Arial,sans-serif;
    }

    header{
      position:sticky;
      top:0;
      z-index:20;

      display:flex;
      align-items:center;
      justify-content:space-between;

      padding:16px 18px;

      background:rgba(15,15,16,.92);
      backdrop-filter:blur(14px);

      border-bottom:1px solid var(--line);
    }

    .title{
      font-size:20px;
      font-weight:800;

      display:flex;
      align-items:center;
      gap:10px;
    }

    .badge{
      background:rgba(255,59,48,.12);
      color:#ff857d;

      border:1px solid rgba(255,59,48,.25);

      padding:6px 10px;
      border-radius:999px;

      font-size:12px;
      font-weight:700;
    }

    #app{
      padding:14px;
    }

    .day{
      margin-bottom:14px;

      border:1px solid var(--line);
      border-radius:18px;

      overflow:hidden;

      background:linear-gradient(
        180deg,
        var(--card2),
        var(--card)
      );

      box-shadow:
        0 10px 30px rgba(0,0,0,.24);
    }

    .day-header{
      padding:16px 18px;

      display:flex;
      align-items:center;
      justify-content:space-between;

      cursor:pointer;

      user-select:none;

      transition:.18s ease;
    }

    .day-header:hover{
      background:rgba(255,255,255,.03);
    }

    .day-left{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .day-date{
      font-size:16px;
      font-weight:800;
    }

    .day-count{
      font-size:12px;
      color:var(--muted);

      padding:6px 10px;

      border-radius:999px;

      background:#22242a;
    }

    .tasks{
      display:none;

      border-top:1px solid var(--line);
    }

    .task{
      padding:14px 18px;

      border-bottom:1px solid rgba(255,255,255,.04);

      cursor:pointer;

      transition:.15s ease;
    }

    .task:last-child{
      border-bottom:none;
    }

    .task:hover{
      background:rgba(255,255,255,.03);
    }

    .task-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .task-title{
      font-weight:700;
      font-size:15px;
    }

    .task-id{
      margin-top:6px;

      color:var(--muted);

      font-size:12px;
    }

    .task-badges{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }

    .pill{
      font-size:11px;
      font-weight:700;

      padding:5px 8px;

      border-radius:999px;
    }

    .pill.red{
      background:rgba(255,59,48,.14);
      color:#ff8d86;
    }

    .pill.blue{
      background:rgba(59,130,246,.14);
      color:#8ab8ff;
    }

    .pill.green{
      background:rgba(34,197,94,.14);
      color:#7df0a8;
    }

    /* MODAL */

    .modal{
      position:fixed;
      inset:0;

      display:none;
      align-items:center;
      justify-content:center;

      background:rgba(0,0,0,.82);

      z-index:100;
      padding:16px;
    }

    .modal-content{
      width:100%;
      max-width:760px;

      max-height:90vh;
      overflow:auto;

      background:linear-gradient(
        180deg,
        #1b1d22,
        #16171b
      );

      border:1px solid var(--line);

      border-radius:24px;

      padding:20px;
    }

    .modal-head{
      display:flex;
      justify-content:space-between;
      align-items:center;

      margin-bottom:16px;
    }

    .modal-title{
      font-size:22px;
      font-weight:800;
    }

    .close{
      width:42px;
      height:42px;

      border:none;
      border-radius:12px;

      background:#262932;
      color:#fff;

      cursor:pointer;

      font-size:18px;
      font-weight:800;
    }

    .section{
      margin-top:14px;

      background:#1f2128;

      border:1px solid rgba(255,255,255,.05);

      border-radius:16px;

      padding:14px;
    }

    .section-title{
      font-size:13px;
      font-weight:800;

      color:#ff8d86;

      margin-bottom:10px;

      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .desc{
      line-height:1.5;
      color:#d7d7db;
      white-space:pre-wrap;
    }

    .files{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
      gap:10px;
    }

    .file{
      background:#262932;

      border-radius:14px;

      overflow:hidden;

      border:1px solid rgba(255,255,255,.06);
    }

    .file img{
      width:100%;
      height:140px;
      object-fit:cover;

      display:block;
    }

    .file a{
      display:block;

      padding:10px;

      color:#fff;
      text-decoration:none;

      font-size:12px;
      font-weight:700;
    }

    .comment{
      padding:10px 12px;

      background:#262932;

      border-radius:12px;

      margin-bottom:8px;

      font-size:13px;
      line-height:1.4;
    }

    pre{
      overflow:auto;

      padding:12px;

      border-radius:12px;

      background:#111215;

      color:#9cdcfe;

      font-size:12px;
    }

    /* LOADER */

    .loader-wrap{
      position:fixed;
      inset:0;

      z-index:9999;

      display:flex;
      align-items:center;
      justify-content:center;

      background:
        radial-gradient(circle at top,#1b1b1f 0%,#0f0f10 60%);

      transition:.35s ease;
    }

    .loader-wrap.hide{
      opacity:0;
      pointer-events:none;
    }

    .loader-box{
      text-align:center;
    }

    .loader-spinner{
      width:74px;
      height:74px;

      margin:0 auto 20px;

      border-radius:50%;

      border:5px solid rgba(255,255,255,.08);
      border-top:5px solid var(--red);

      animation:spin .9s linear infinite;

      box-shadow:
        0 0 30px rgba(255,59,48,.25);
    }

    .loader-title{
      font-size:24px;
      font-weight:800;

      margin-bottom:8px;
    }

    .loader-sub{
      color:var(--muted);
      font-size:14px;
    }

    @keyframes spin{
      from{
        transform:rotate(0deg);
      }
      to{
        transform:rotate(360deg);
      }
    }
  </style>
</head>

<body>

<div id="loader" class="loader-wrap">
  <div class="loader-box">

    <div class="loader-spinner"></div>

    <div class="loader-title">
      Загружаем архив
    </div>

    <div class="loader-sub">
      Получаем задачи из Firebase...
    </div>

  </div>
</div>

<header>
  <div class="title">
    📦 Архив задач
  </div>

  <div class="badge" id="countBadge">
    0 задач
  </div>
</header>

<div id="app"></div>

<div class="modal" id="modal">
  <div class="modal-content">

    <div class="modal-head">
      <div class="modal-title" id="modalTitle">
        Задача
      </div>

      <button class="close" onclick="closeModal()">
        ✕
      </button>
    </div>

    <div id="modalBody"></div>

  </div>
</div>

<script type="module">
  import {
    initializeApp
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

  import {
    getFirestore,
    collectionGroup,
    getDocs
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAH58ZP...",
    authDomain: "skladsborka-6c2a7.firebaseapp.com",
    projectId: "skladsborka-6c2a7",
    storageBucket: "skladsborka-6c2a7.firebasestorage.app",
    appId: "1:516526717198:android:e470c17aed370572757f5f"
  };

  const appFirebase = initializeApp(firebaseConfig);
  const db = getFirestore(appFirebase);

  const app = document.getElementById("app");
  const modal = document.getElementById("modal");
  const modalBody = document.getElementById("modalBody");
  const modalTitle = document.getElementById("modalTitle");
  const loader = document.getElementById("loader");
  const countBadge = document.getElementById("countBadge");

  window.closeModal = () => {
    modal.style.display = "none";
  };

  window.openTask = (task) => {

    modal.style.display = "flex";

    const d = task.data;

    modalTitle.innerText =
      d.title || "Без названия";

    let filesHtml = "";

    if (d.files && Array.isArray(d.files)) {

      d.files.forEach((f, i) => {

        const url = f.url || f.secure_url || f;

        const isPdf =
          String(url).toLowerCase().includes(".pdf");

        filesHtml += `
          <div class="file">

            ${
              isPdf
                ? `
                  <div style="
                    height:140px;
                    display:flex;
                    align-items:center;
                    justify-content:center;
                    font-size:54px;
                    background:#1f2128;
                  ">
                    📄
                  </div>
                `
                : `<img src="${url}" />`
            }

            <a href="${url}" target="_blank">
              Открыть файл
            </a>

          </div>
        `;
      });
    }

    let commentsHtml = "";

    if (d.comments && Array.isArray(d.comments)) {

      d.comments.forEach(c => {

        commentsHtml += `
          <div class="comment">
            ${c.text || c}
          </div>
        `;
      });
    }

    modalBody.innerHTML = `

      <div class="section">
        <div class="section-title">
          ID
        </div>

        ${task.id}
      </div>

      <div class="section">
        <div class="section-title">
          Описание
        </div>

        <div class="desc">
          ${d.description || d.comment || "Нет описания"}
        </div>
      </div>

      <div class="section">
        <div class="section-title">
          Вложения
        </div>

        ${
          filesHtml
            ? `<div class="files">${filesHtml}</div>`
            : `<div class="desc">Файлов нет</div>`
        }
      </div>

      <div class="section">
        <div class="section-title">
          Комментарии
        </div>

        ${
          commentsHtml ||
          `<div class="desc">Комментариев нет</div>`
        }
      </div>

      <div class="section">
        <div class="section-title">
          RAW DATA
        </div>

        <pre>${JSON.stringify(d, null, 2)}</pre>
      </div>
    `;
  };

  async function load() {

    app.innerHTML = "";

    const snap =
      await getDocs(collectionGroup(db, "tasks"));

    const groups = {};
    let total = 0;

    snap.forEach(doc => {

      const data = doc.data();

      const date =
        data.date ||
        (
          data.createdAt?.seconds
            ? new Date(
                data.createdAt.seconds * 1000
              ).toISOString().slice(0,10)
            : "Без даты"
        );

      if (!groups[date]) {
        groups[date] = [];
      }

      groups[date].push({
        id: doc.id,
        data
      });

      total++;
    });

    countBadge.innerText =
      `${total} задач`;

    Object.keys(groups)
      .sort((a,b)=> b.localeCompare(a))
      .forEach(date => {

      let html = "";

      groups[date].forEach(t => {

        const d = t.data;

        let badges = "";

        if (d.assembledOrder) {
          badges += `
            <span class="pill red">
              Собранный
            </span>
          `;
        }

        if (d.isPickup) {
          badges += `
            <span class="pill blue">
              Самовывоз
            </span>
          `;
        }

        if (
          String(d.status).toLowerCase() === "done"
        ) {
          badges += `
            <span class="pill green">
              Готово
            </span>
          `;
        }

        html += `
          <div class="task">

            <div
              onclick='openTask(${JSON.stringify(t)})'
            >

              <div class="task-top">

                <div class="task-title">
                  ${d.title || "Без названия"}
                </div>

                <div class="task-badges">
                  ${badges}
                </div>

              </div>

              <div class="task-id">
                ${t.id}
              </div>

            </div>

          </div>
        `;
      });

      app.innerHTML += `

        <div class="day">

          <div
            class="day-header"
            onclick="
              this.nextElementSibling.style.display =
              this.nextElementSibling.style.display === 'block'
              ? 'none'
              : 'block'
            "
          >

            <div class="day-left">

              <div class="day-date">
                📅 ${date}
              </div>

            </div>

            <div class="day-count">
              ${groups[date].length}
            </div>

          </div>

          <div class="tasks">
            ${html}
          </div>

        </div>
      `;
    });

    setTimeout(() => {
      loader.classList.add("hide");
    }, 500);
  }

  load();
</script>

</body>
</html>
