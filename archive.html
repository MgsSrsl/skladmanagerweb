<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Firebase Safe Debug</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f10;
      color: #fff;
    }

    header {
      padding: 14px;
      font-weight: bold;
      border-bottom: 1px solid #2a2a2a;
    }

    #log {
      padding: 10px;
      font-size: 12px;
      white-space: pre-wrap;
      color: #aaa;
    }

    .err { color: #ff4d4d; }
    .ok { color: #4dff88; }
  </style>
</head>

<body>

<header>🧪 SAFE FIREBASE DEBUG</header>

<div id="log">loading...</div>

<script type="module">
  const logEl = document.getElementById("log");

  function log(msg, cls = "") {
    console.log(msg);
    logEl.innerHTML += `\n<span class="${cls}">${msg}</span>`;
  }

  window.onerror = function(msg) {
    log("🔥 JS ERROR: " + msg, "err");
  };

  try {
    log("🚀 SCRIPT START");

    import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js").then(appMod => {
      import("https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js").then(fsMod => {

        const { initializeApp } = appMod;
        const { getFirestore, collectionGroup, getDocs } = fsMod;

        const firebaseConfig = {
          apiKey: "AIzaSyAH58ZpWAp64mhM589KD6jXHcOlPqU0aYU",
          authDomain: "skladsborka-6c2a7.firebaseapp.com",
          projectId: "skladsborka-6c2a7",
          storageBucket: "skladsborka-6c2a7.firebasestorage.app",
          appId: "1:516526717198:android:e470c17aed370572757f5f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        log("✔ Firebase init OK");

        getDocs(collectionGroup(db, "tasks"))
          .then(snap => {
            log("📦 TASKS SIZE: " + snap.size);

            snap.forEach(t => {
              log("PATH: " + t.ref.path);
            });

            log("✅ DONE", "ok");
          })
          .catch(e => {
            log("🔥 FIREBASE ERROR: " + e.message, "err");
          });

      }).catch(e => log("🔥 FIRESTORE LOAD FAIL: " + e.message, "err"));
    }).catch(e => log("🔥 APP LOAD FAIL: " + e.message, "err"));

  } catch (e) {
    log("🔥 FATAL: " + e.message, "err");
  }
</script>

</body>
</html>
