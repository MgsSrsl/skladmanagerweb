<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Archive + Task Details</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f10;
      color: #fff;
    }

    header {
      padding: 14px;
      font-weight: bold;
      border-bottom: 1px solid #2a2a2a;
    }

    .day {
      margin: 10px;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
      background: #1a1a1d;
    }

    .day-header {
      padding: 10px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      background: #151518;
    }

    .task {
      padding: 10px;
      border-bottom: 1px solid #2a2a2a;
      font-size: 13px;
      cursor: pointer;
    }

    .task:hover {
      background: #222;
    }

    .task small {
      display: block;
      color: #777;
      margin-top: 4px;
    }

    .tasks {
      display: none;
    }

    /* MODAL */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      width: 90%;
      max-width: 600px;
      background: #1a1a1d;
      border-radius: 12px;
      padding: 15px;
      border: 1px solid #333;
    }

    .close {
      float: right;
      cursor: pointer;
      color: #ff4d4d;
    }

    .section {
      margin-top: 10px;
      padding: 10px;
      background: #151518;
      border-radius: 8px;
    }

    img {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 5px;
    }

    .comment {
      padding: 6px;
      border-bottom: 1px solid #2a2a2a;
      font-size: 12px;
    }

  </style>
</head>

<body>

<header>📦 ARCHIVE + TASK DETAILS</header>

<div id="app"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <div id="modalBody">loading...</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, collectionGroup, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAH58ZP...",
    authDomain: "skladsborka-6c2a7.firebaseapp.com",
    projectId: "skladsborka-6c2a7",
    storageBucket: "skladsborka-6c2a7.firebasestorage.app",
    appId: "1:516526717198:android:e470c17aed370572757f5f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const appDiv = document.getElementById("app");
  const modal = document.getElementById("modal");
  const modalBody = document.getElementById("modalBody");

  window.closeModal = () => {
    modal.style.display = "none";
  };

  window.openTask = (task) => {
    modal.style.display = "flex";

    const d = task.data;

    // 🔥 Cloudinary files (если есть массив)
    let filesHtml = "";
    if (d.files && Array.isArray(d.files)) {
      d.files.forEach(f => {
        filesHtml += `<img src="${f.url || f}" />`;
      });
    }

    // 💬 comments
    let commentsHtml = "";
    if (d.comments && Array.isArray(d.comments)) {
      d.comments.forEach(c => {
        commentsHtml += `<div class="comment">${c.text || c}</div>`;
      });
    }

    modalBody.innerHTML = `
      <h3>${d.title || "Без названия"}</h3>

      <div class="section">
        <b>ID:</b> ${task.id}
      </div>

      <div class="section">
        <b>Описание:</b><br/>
        ${d.description || "нет"}
      </div>

      <div class="section">
        <b>Файлы (Cloudinary):</b><br/>
        ${filesHtml || "нет файлов"}
      </div>

      <div class="section">
        <b>Комментарии:</b><br/>
        ${commentsHtml || "нет комментариев"}
      </div>

      <div class="section">
        <b>RAW DATA:</b>
        <pre>${JSON.stringify(d, null, 2)}</pre>
      </div>
    `;
  };

  async function load() {
    const snap = await getDocs(collectionGroup(db, "tasks"));

    const groups = {};

    snap.forEach(doc => {
      const data = doc.data();
      const date = data.date || "Без даты";

      if (!groups[date]) groups[date] = [];

      groups[date].push({
        id: doc.id,
        data
      });
    });

    Object.keys(groups).forEach(date => {
      let html = "";

      groups[date].forEach(t => {
        html += `
          <div class="task" onclick='openTask(${JSON.stringify(t)})'>
            ${t.data.title || "Без названия"}
            <small>${t.id}</small>
          </div>
        `;
      });

      appDiv.innerHTML += `
        <div class="day">
          <div class="day-header" onclick="this.nextElementSibling.style.display =
            this.nextElementSibling.style.display === 'block' ? 'none' : 'block'">
            <span>${date}</span>
            <span>${groups[date].length}</span>
          </div>
          <div class="tasks">
            ${html}
          </div>
        </div>
      `;
    });
  }

  load();
</script>

</body>
</html>
