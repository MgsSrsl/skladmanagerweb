<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tasks CollectionGroup Debug</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f10;
      color: #fff;
    }

    header {
      padding: 14px;
      font-weight: bold;
      border-bottom: 1px solid #2a2a2a;
    }

    .log {
      padding: 6px 10px;
      font-size: 12px;
      color: #aaa;
      border-bottom: 1px solid #222;
      white-space: pre-wrap;
    }

    .box {
      margin: 10px;
      padding: 10px;
      background: #1a1a1d;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      font-size: 12px;
    }

    .ok { color: #4dff88; }
    .bad { color: #ff4d4d; }
  </style>
</head>

<body>

<header>🧪 GLOBAL TASKS DEBUG (collectionGroup)</header>

<div id="logs"></div>
<div id="out"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, collectionGroup, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAH58ZpWAp64mhM589KD6jXHcOlPqU0aYU",
    authDomain: "skladsborka-6c2a7.firebaseapp.com",
    projectId: "skladsborka-6c2a7",
    storageBucket: "skladsborka-6c2a7.firebasestorage.app",
    appId: "1:516526717198:android:e470c17aed370572757f5f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const logs = document.getElementById("logs");
  const out = document.getElementById("out");

  function log(msg, type = "") {
    console.log(msg);
    logs.innerHTML += `<div class="log ${type}">${msg}</div>`;
  }

  async function run() {
    try {
      log("🚀 START COLLECTION GROUP TEST");

      const snap = await getDocs(collectionGroup(db, "tasks"));

      log("📦 GLOBAL TASKS SIZE: " + snap.size, snap.size ? "ok" : "bad");

      if (snap.empty) {
        log("❌ NO TASKS FOUND ANYWHERE", "bad");
        return;
      }

      snap.forEach(t => {
        const data = t.data();

        log("📍 PATH: " + t.ref.path);

        out.innerHTML += `
          <div class="box">
            <b>PATH:</b> ${t.ref.path}<br/><br/>
            <b>DATA:</b>
            <pre>${JSON.stringify(data, null, 2)}</pre>
          </div>
        `;
      });

      log("✅ DONE");

    } catch (e) {
      log("🔥 ERROR: " + e.message, "bad");
    }
  }

  run();
</script>

</body>
</html>
