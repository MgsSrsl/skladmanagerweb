<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Архив задач</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f10;
      color: #fff;
    }

    header {
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #2a2a2a;
    }

    .container {
      padding: 16px;
    }

    .task {
      background: #1a1a1d;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      border: 1px solid #2a2a2a;
    }

    .date {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 6px;
    }

    .title {
      font-size: 16px;
    }

    .empty {
      color: #888;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>📦 Архив задач</header>

<div class="container" id="archive-list">
  Загрузка...
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  // ⚠️ ВСТАВЬ СВОЙ firebaseConfig
  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_BUCKET",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadArchive() {
    const container = document.getElementById("archive-list");
    container.innerHTML = "Загрузка...";

    const archivesRef = collection(db, "archives");
    const archivesSnap = await getDocs(archivesRef);

    const tasks = [];

    for (const docSnap of archivesSnap.docs) {
      const date = docSnap.id;

      const tasksRef = collection(db, "archives", date, "tasks");
      const tasksSnap = await getDocs(tasksRef);

      tasksSnap.forEach(t => {
        tasks.push({
          id: t.id,
          date,
          ...t.data()
        });
      });
    }

    if (tasks.length === 0) {
      container.innerHTML = `<div class="empty">Архив пуст</div>`;
      return;
    }

    container.innerHTML = tasks.map(t => `
      <div class="task">
        <div class="date">${t.date}</div>
        <div class="title">${t.title || "Без названия"}</div>
      </div>
    `).join("");
  }

  loadArchive();
</script>

</body>
</html>
