<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Архив задач</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f10;
      color: #fff;
    }

    header {
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #2a2a2a;
    }

    .container {
      padding: 16px;
    }

    .day {
      background: #1a1a1d;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .day-header {
      padding: 12px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
    }

    .tasks {
      display: none;
      border-top: 1px solid #2a2a2a;
    }

    .task {
      padding: 10px 12px;
      border-bottom: 1px solid #2a2a2a;
    }

    .task:last-child {
      border-bottom: none;
    }

    .task-title {
      font-size: 14px;
    }

    .task-id {
      font-size: 11px;
      color: #777;
      margin-top: 4px;
    }

    .empty {
      color: #888;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>📦 Архив задач</header>

<div class="container" id="archive-list">Загрузка...</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  // 🔥 ВСТАВЬ СВОЙ CONFIG
  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_BUCKET",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadArchive() {
    const container = document.getElementById("archive-list");
    container.innerHTML = "Загрузка...";

    const archivesSnap = await getDocs(collection(db, "archives"));

    if (archivesSnap.empty) {
      container.innerHTML = "<div class='empty'>Архив пуст</div>";
      return;
    }

    const htmlBlocks = [];

    for (const dayDoc of archivesSnap.docs) {
      const date = dayDoc.id;

      const tasksSnap = await getDocs(
        collection(db, "archives", date, "tasks")
      );

      const tasksHtml = tasksSnap.docs.map(t => {
        const data = t.data();

        return `
          <div class="task">
            <div class="task-title">${data.title || "Без названия"}</div>
            <div class="task-id">ID: ${t.id}</div>
          </div>
        `;
      }).join("");

      htmlBlocks.push(`
        <div class="day">
          <div class="day-header" onclick="toggleDay(this)">
            <span>${date}</span>
            <span>▼</span>
          </div>
          <div class="tasks">
            ${tasksHtml || "<div class='task'>Нет задач</div>"}
          </div>
        </div>
      `);
    }

    container.innerHTML = htmlBlocks.join("");
  }

  window.toggleDay = function(el) {
    const tasks = el.nextElementSibling;
    tasks.style.display = tasks.style.display === "block" ? "none" : "block";
  };

  loadArchive();
</script>

</body>
</html>
