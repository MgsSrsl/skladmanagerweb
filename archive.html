<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ARCHIVE FULL DEBUG</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f10;
      color: #fff;
    }

    header {
      padding: 14px;
      font-weight: bold;
      border-bottom: 1px solid #2a2a2a;
    }

    .log {
      font-size: 12px;
      padding: 6px 10px;
      color: #aaa;
      border-bottom: 1px solid #222;
      white-space: pre-wrap;
    }

    .box {
      margin: 10px;
      padding: 10px;
      background: #1a1a1d;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
    }

    .title {
      font-weight: bold;
      margin-bottom: 6px;
    }

    pre {
      font-size: 11px;
      color: #ccc;
      overflow-x: auto;
    }

    .ok { color: #4dff88; }
    .bad { color: #ff4d4d; }
  </style>
</head>

<body>

<header>🧪 FULL FIREBASE ARCHIVE DEBUG</header>

<div id="logs"></div>
<div id="out"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import {
    getFirestore,
    collection,
    getDocs,
    doc,
    getDoc
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAH58ZpWAp64mhM589KD6jXHcOlPqU0aYU",
    authDomain: "skladsborka-6c2a7.firebaseapp.com",
    projectId: "skladsborka-6c2a7",
    storageBucket: "skladsborka-6c2a7.firebasestorage.app",
    appId: "1:516526717198:android:e470c17aed370572757f5f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const logs = document.getElementById("logs");
  const out = document.getElementById("out");

  function log(msg, cls = "") {
    console.log(msg);
    logs.innerHTML += `<div class="log ${cls}">${msg}</div>`;
  }

  async function run() {
    try {
      log("🚀 START DEBUG");
      log("PROJECT: " + firebaseConfig.projectId);

      // 1. CHECK ROOT COLLECTION
      const archivesSnap = await getDocs(collection(db, "archives"));

      log("📁 archives SIZE: " + archivesSnap.size);

      if (archivesSnap.empty) {
        log("❌ archives EMPTY", "bad");
      } else {
        log("✔ archives FOUND", "ok");
      }

      // 2. SHOW ALL ARCHIVE DOCS
      archivesSnap.forEach(d => {
        log("📅 ARCHIVE DOC: " + d.id);

        out.innerHTML += `
          <div class="box">
            <div class="title">ARCHIVE: ${d.id}</div>
            <pre>${JSON.stringify(d.data(), null, 2)}</pre>
          </div>
        `;
      });

      // 3. HARD CHECK FIXED DATE (ВАЖНО)
      const testDate = "2025-11-05";

      log("🔍 CHECKING DIRECT DOC: " + testDate);

      const docRef = doc(db, "archives", testDate);
      const docSnap = await getDoc(docRef);

      log("EXISTS: " + docSnap.exists());

      if (docSnap.exists()) {
        log("✔ DATE DOC FOUND", "ok");
      } else {
        log("❌ DATE DOC NOT FOUND", "bad");
      }

      // 4. CHECK TASKS SUBCOLLECTION
      const tasksSnap = await getDocs(
        collection(db, "archives", testDate, "tasks")
      );

      log("📦 TASKS SIZE: " + tasksSnap.size);

      tasksSnap.forEach(t => {
        const data = t.data();

        out.innerHTML += `
          <div class="box">
            <div class="title">TASK: ${t.id}</div>
            <pre>${JSON.stringify(data, null, 2)}</pre>
          </div>
        `;
      });

      log("✅ DONE");

    } catch (e) {
      log("🔥 ERROR: " + e.message, "bad");
      console.error(e);
    }
  }

  run();
</script>

</body>
</html>
