<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Firestore Archives Test</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f10;
      color: #fff;
    }

    header {
      padding: 14px;
      font-weight: bold;
      border-bottom: 1px solid #2a2a2a;
    }

    .log {
      padding: 6px 10px;
      font-size: 12px;
      color: #aaa;
      border-bottom: 1px solid #222;
      white-space: pre-wrap;
    }

    .ok { color: #4dff88; }
    .bad { color: #ff4d4d; }
  </style>
</head>

<body>

<header>🧪 ARCHIVES RAW TEST</header>

<div id="logs"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAH58ZpWAp64mhM589KD6jXHcOlPqU0aYU",
    authDomain: "skladsborka-6c2a7.firebaseapp.com",
    projectId: "skladsborka-6c2a7",
    storageBucket: "skladsborka-6c2a7.firebasestorage.app",
    appId: "1:516526717198:android:e470c17aed370572757f5f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const logs = document.getElementById("logs");

  function log(msg, type = "") {
    console.log(msg);
    logs.innerHTML += `<div class="log ${type}">${msg}</div>`;
  }

  async function test() {
    try {
      log("🚀 START TEST");
      log("PROJECT: " + firebaseConfig.projectId);

      const snap = await getDocs(collection(db, "archives"));

      log("📁 ARCHIVES SIZE: " + snap.size, snap.size ? "ok" : "bad");

      if (snap.empty) {
        log("❌ NO DATA IN archives", "bad");
      } else {
        log("✔ DATA FOUND", "ok");

        snap.forEach(d => {
          log("DOC: " + d.id + " → " + JSON.stringify(d.data()));
        });
      }

      log("✅ DONE");

    } catch (e) {
      log("🔥 ERROR: " + e.message, "bad");
    }
  }

  test();
</script>

</body>
</html>
