<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Archive Debug</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f10;
      color: #fff;
    }

    header {
      padding: 14px;
      border-bottom: 1px solid #2a2a2a;
      font-weight: bold;
    }

    .log {
      padding: 10px;
      font-size: 12px;
      color: #aaa;
      border-bottom: 1px solid #222;
      white-space: pre-wrap;
    }

    .error { color: #ff4d4d; }
    .ok { color: #4dff88; }

    .container {
      padding: 12px;
    }

    .day {
      margin-bottom: 10px;
      background: #1a1a1d;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 10px;
    }

    .task {
      font-size: 13px;
      padding: 6px 0;
      border-bottom: 1px solid #2a2a2a;
    }
  </style>
</head>

<body>

<header>🧪 Archive Debug Mode</header>

<div id="logs"></div>
<div class="container" id="archive"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_BUCKET",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const logs = document.getElementById("logs");
  const out = document.getElementById("archive");

  function log(msg, type = "") {
    const div = document.createElement("div");
    div.className = "log " + type;
    div.textContent = msg;
    logs.appendChild(div);
  }

  async function run() {
    try {
      log("🚀 Start loading archive...");

      const archivesRef = collection(db, "archives");
      const archivesSnap = await getDocs(archivesRef);

      log("📁 archives count: " + archivesSnap.size);

      if (archivesSnap.empty) {
        log("❌ archives collection is EMPTY", "error");
        out.innerHTML = "EMPTY archives";
        return;
      }

      for (const docSnap of archivesSnap.docs) {
        const date = docSnap.id;
        log("📅 date doc: " + date);

        const tasksRef = collection(db, "archives", date, "tasks");
        const tasksSnap = await getDocs(tasksRef);

        log("   └ tasks: " + tasksSnap.size);

        const dayBlock = document.createElement("div");
        dayBlock.className = "day";

        let html = `<b>${date}</b><br/>`;

        if (tasksSnap.empty) {
          html += `<div class="log error">NO TASKS</div>`;
        }

        tasksSnap.forEach(t => {
          const data = t.data();
          log("      task: " + t.id);

          html += `
            <div class="task">
              ${data.title || "no title"}<br/>
              <small>${t.id}</small>
            </div>
          `;
        });

        dayBlock.innerHTML = html;
        out.appendChild(dayBlock);
      }

      log("✅ DONE", "ok");

    } catch (e) {
      log("🔥 ERROR: " + e.message, "error");
      console.error(e);
    }
  }

  run();
</script>

</body>
</html>
