<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Складская доска</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f3f4f6}
.toolbar{padding:12px;background:#111827;color:#fff;display:flex;gap:8px;flex-wrap:wrap;position:sticky;top:0}
input,button{padding:8px}
#board{display:flex;gap:16px;padding:16px;align-items:flex-start;overflow:auto}
.column{background:#fff;border-radius:12px;padding:12px;width:320px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header{display:flex;justify-content:space-between;align-items:center}
.tasks{min-height:80px;padding-top:8px}
.task{background:#dbeafe;margin:8px 0;padding:10px;border-radius:8px;cursor:move}
.queueTitle{font-size:12px;color:#666;margin-top:8px}
.small{font-size:12px}
button{cursor:pointer}
</style>
</head>
<body>
<div class="toolbar">
<input id="workerName" placeholder="Кладовщик">
<button onclick="addWorker()">Добавить кладовщика</button>

<input id="taskName" placeholder="Задача">
<button onclick="addTask()">Добавить задачу</button>
</div>

<div id="board"></div>

<script>
const STORAGE="warehouse_board_v1";

let state=JSON.parse(localStorage.getItem(STORAGE)||"null")||{
  backlog:[
    {id:id(),text:"Тестовая задача"}
  ],
  workers:[
    {id:id(),name:"Иван",tasks:[]}
  ]
};

function id(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2);
}

function save(){
 localStorage.setItem(STORAGE,JSON.stringify(state));
}

function addWorker(){
 const el=document.getElementById("workerName");
 const name=el.value.trim();
 if(!name)return;
 state.workers.push({id:id(),name,tasks:[]});
 el.value="";
 save();render();
}

function removeWorker(workerId){
 if(!confirm("Удалить кладовщика?")) return;
 const idx=state.workers.findIndex(w=>w.id===workerId);
 if(idx<0)return;
 state.backlog.push(...state.workers[idx].tasks);
 state.workers.splice(idx,1);
 save();render();
}

function addTask(){
 const el=document.getElementById("taskName");
 const text=el.value.trim();
 if(!text)return;
 state.backlog.push({id:id(),text});
 el.value="";
 save();render();
}

function removeTask(taskId){
 state.backlog=state.backlog.filter(t=>t.id!==taskId);
 state.workers.forEach(w=>w.tasks=w.tasks.filter(t=>t.id!==taskId));
 save();render();
}

function dragStart(ev,taskId,source){
 ev.dataTransfer.setData("taskId",taskId);
 ev.dataTransfer.setData("source",source);
}

function allowDrop(ev){ev.preventDefault();}

function moveTask(taskId,source,target){
 let task=null;

 if(source==="backlog"){
   const i=state.backlog.findIndex(t=>t.id===taskId);
   if(i>=0) task=state.backlog.splice(i,1)[0];
 }else{
   const w=state.workers.find(x=>x.id===source);
   const i=w.tasks.findIndex(t=>t.id===taskId);
   task=w.tasks.splice(i,1)[0];
 }

 if(!task)return;

 if(target==="backlog"){
   state.backlog.push(task);
 }else{
   const w=state.workers.find(x=>x.id===target);
   w.tasks.push(task);
 }

 save();render();
}

function dropTo(ev,target){
 ev.preventDefault();
 moveTask(
   ev.dataTransfer.getData("taskId"),
   ev.dataTransfer.getData("source"),
   target
 );
}

function taskHtml(task,source){
 return `
 <div class="task" draggable="true"
   ondragstart="dragStart(event,'${task.id}','${source}')">
   <div>${task.text}</div>
   <div class="small">
      <button onclick="removeTask('${task.id}')">Удалить</button>
   </div>
 </div>`;
}

function render(){
 const board=document.getElementById("board");

 let html=`
 <div class="column">
   <div class="header">
      <b>📌 Нераспределённые задачи</b>
   </div>
   <div class="tasks"
      ondragover="allowDrop(event)"
      ondrop="dropTo(event,'backlog')">
      ${state.backlog.map(t=>taskHtml(t,"backlog")).join("")}
   </div>
 </div>`;

 state.workers.forEach(w=>{
   html+=`
   <div class="column">
      <div class="header">
         <b>${w.name}</b>
         <button onclick="removeWorker('${w.id}')">✖</button>
      </div>

      <div class="queueTitle">
      Текущая задача сверху, остальные в очереди
      </div>

      <div class="tasks"
          ondragover="allowDrop(event)"
          ondrop="dropTo(event,'${w.id}')">
          ${w.tasks.map(t=>taskHtml(t,w.id)).join("")}
      </div>
   </div>`;
 });

 board.innerHTML=html;
}

render();
</script>
</body>
</html>
