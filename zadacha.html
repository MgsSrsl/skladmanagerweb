<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Доска распределения задач</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

.controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

input{
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#2563eb;
    color:white;
}

button:hover{
    opacity:.9;
}

.board{
    display:flex;
    gap:20px;
    align-items:flex-start;
    overflow-x:auto;
}

.column{
    background:white;
    min-width:280px;
    border-radius:12px;
    padding:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.column-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.column-title{
    font-weight:bold;
    font-size:18px;
}

.task-list{
    min-height:150px;
}

.task{
    background:#eef2ff;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
    cursor:grab;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.task.dragging{
    opacity:.5;
}

.delete-btn{
    background:red;
    color:white;
    border:none;
    border-radius:50%;
    width:22px;
    height:22px;
    cursor:pointer;
}

.drop-zone{
    min-height:100px;
}
</style>
</head>
<body>

<h1>📋 Доска распределения задач</h1>

<div class="controls">
    <input id="workerName" placeholder="Имя кладовщика">
    <button onclick="addWorker()">Добавить кладовщика</button>

    <input id="taskText" placeholder="Новое задание">
    <button onclick="addTask()">Добавить задание</button>
</div>

<div class="board" id="board"></div>

<script>

let data = JSON.parse(localStorage.getItem('warehouseBoard')) || {
    workers:[
        {
            id:'new',
            name:'Новые задания',
            tasks:[]
        }
    ]
};

function save(){
    localStorage.setItem(
        'warehouseBoard',
        JSON.stringify(data)
    );
}

function render(){

    const board=document.getElementById('board');
    board.innerHTML='';

    data.workers.forEach(worker=>{

        const col=document.createElement('div');
        col.className='column';

        col.innerHTML=
            <div class="column-header">
                <div class="column-title">${worker.name}</div>
            </div>

            <div class="task-list drop-zone"
                 data-worker="${worker.id}">
            </div>
        ;

        const taskList=col.querySelector('.task-list');

        worker.tasks.forEach(task=>{

            const taskEl=document.createElement('div');
            taskEl.className='task';
            taskEl.draggable=true;
            taskEl.dataset.task=task.id;

            taskEl.innerHTML=
                <span>${task.text}</span>
                <button class="delete-btn">×</button>
            ;

            taskEl.addEventListener('dragstart',()=>{
                taskEl.classList.add('dragging');
            });

            taskEl.addEventListener('dragend',()=>{
                taskEl.classList.remove('dragging');
            });

            taskEl.querySelector('.delete-btn')
                .onclick=()=>deleteTask(task.id);

            taskList.appendChild(taskEl);
        });

        board.appendChild(col);
    });

    initDragDrop();
}

function addWorker(){

    const input=document.getElementById('workerName');

    const name=input.value.trim();

    if(!name) return;

    data.workers.push({
        id:Date.now().toString(),
        name:name,
        tasks:[]
    });

    input.value='';

    save();
    render();
}

function addTask(){

    const input=document.getElementById('taskText');

    const text=input.value.trim();

    if(!text) return;

    data.workers[0].tasks.push({
        id:crypto.randomUUID(),
        text:text
    });
    input.value='';

    save();
    render();
}

function deleteTask(taskId){

    data.workers.forEach(worker=>{
        worker.tasks=
            worker.tasks.filter(
                t=>t.id!==taskId
            );
    });

    save();
    render();
}

function initDragDrop(){

    document.querySelectorAll('.drop-zone')
        .forEach(zone=>{

        zone.addEventListener('dragover',e=>{
            e.preventDefault();
        });

        zone.addEventListener('drop',e=>{

            e.preventDefault();

            const taskId=document.querySelector(
                '.dragging'
            ).dataset.task;

            let movedTask=null;

            data.workers.forEach(worker=>{

                const index=
                    worker.tasks.findIndex(
                        t=>t.id===taskId
                    );

                if(index!==-1){
                    movedTask=
                        worker.tasks.splice(index,1)[0];
                }
            });

            if(movedTask){

                const workerId=
                    zone.dataset.worker;

                const worker=
                    data.workers.find(
                        w=>w.id===workerId
                    );

                worker.tasks.push(movedTask);

                save();
                render();
            }
        });
    });
}

render();

</script>

</body>
</html>
