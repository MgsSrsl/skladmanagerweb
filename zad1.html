<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Складская доска v3</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f4f6;
}

.toolbar{
  padding:12px;
  background:#111827;
  color:#fff;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  position:sticky;
  top:0;
}

input,button{
  padding:8px;
}

button{cursor:pointer}

#board{
  display:flex;
  gap:12px;
  padding:16px;
}

/* колонки */
.column{
  flex:1;
  background:#fff;
  border-radius:12px;
  padding:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
  min-height:300px;
}

.colTitle{
  font-weight:bold;
  margin-bottom:10px;
  padding-bottom:6px;
  border-bottom:1px solid #ddd;
}

/* карточки */
.task, .team{
  padding:8px;
  margin:6px 0;
  border-radius:8px;
  background:#e0f2fe;
  cursor:grab;
}

.team{
  background:#e5e7eb;
}

.small{
  font-size:12px;
  color:#555;
  margin-top:4px;
}

.dropzone{
  min-height:40px;
  padding:6px;
  border:2px dashed transparent;
}

.dropzone.dragover{
  border-color:#3b82f6;
  background:#eff6ff;
}

</style>
</head>

<body>

<div class="toolbar">
  <input id="teamName" placeholder="Название команды">
  <input id="teamMembers" placeholder="Участники через запятую">
  <button onclick="addTeam()">Добавить команду</button>

  <input id="taskName" placeholder="Новая задача">
  <button onclick="addTask()">Добавить задачу</button>
</div>

<div id="board"></div>

<script>
const STORAGE="warehouse_board_v3";

let state = JSON.parse(localStorage.getItem(STORAGE)) || {
  teams:[],
  unassigned:[]
};

function id(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2);
}

function save(){
  localStorage.setItem(STORAGE,JSON.stringify(state));
}

/* ===== TEAM ===== */

function addTeam(){
  const name = document.getElementById("teamName").value.trim();
  const members = document.getElementById("teamMembers").value.trim();

  if(!name) return;

  state.teams.push({
    id:id(),
    name,
    members: members ? members.split(",").map(x=>x.trim()) : [],
    activeTask:null,
    queue:[]
  });

  document.getElementById("teamName").value="";
  document.getElementById("teamMembers").value="";

  save();
  render();
}

/* ===== TASK ===== */

function addTask(){
  const text = document.getElementById("taskName").value.trim();
  if(!text) return;

  state.unassigned.push({id:id(), text});

  document.getElementById("taskName").value="";
  save();
  render();
}

/* ===== DRAG CORE ===== */

let dragged = null;

function onDragStart(type, id){
  dragged = {type, id};
}

function allowDrop(e){
  e.preventDefault();
}

/* drop task into team */
function dropOnTeam(teamId){
  if(!dragged || dragged.type !== "task") return;

  const task = state.unassigned.find(t=>t.id===dragged.id);
  if(!task) return;

  const team = state.teams.find(t=>t.id===teamId);
  if(!team) return;

  // remove from unassigned
  state.unassigned = state.unassigned.filter(t=>t.id!==task.id);

  if(!team.activeTask){
    team.activeTask = task;
  }else{
    team.queue.push(task);
  }

  save();
  render();
}

/* reorder teams */
function dropOnTeams(index){
  if(!dragged || dragged.type !== "team") return;

  const teamIndex = state.teams.findIndex(t=>t.id===dragged.id);
  if(teamIndex === -1) return;

  const [moved] = state.teams.splice(teamIndex,1);
  state.teams.splice(index,0,moved);

  save();
  render();
}

/* ===== UI ===== */

function render(){
  const board=document.getElementById("board");

  let html = "";

  /* UNASSIGNED */
  html += `
  <div class="column">
    <div class="colTitle">Безхозные задачи</div>
    <div class="dropzone" ondragover="allowDrop(event)">
      ${state.unassigned.map(t=>`
        <div class="task"
          draggable="true"
          ondragstart="onDragStart('task','${t.id}')">
          ${t.text}
        </div>
      `).join("")}
    </div>
  </div>
  `;

  /* TEAMS */
  html += `
  <div class="column"><div class="colTitle">Команды</div>
    ${state.teams.map((team,i)=>`
      <div class="team"
        draggable="true"
        ondragstart="onDragStart('team','${team.id}')"
        ondragover="allowDrop(event)"
        ondrop="dropOnTeam('${team.id}')">

        <div><b>${team.name}</b></div>
        <div class="small">
          ${team.members.join(", ") || "нет участников"}
        </div>
      </div>
    `).join("")}
  </div>
  `;

  /* ACTIVE / QUEUE */
  html += `
  <div class="column">
    <div class="colTitle">Задачи по командам</div>

    ${state.teams.map(team=>`
      <div style="margin-bottom:12px;">
        <div><b>${team.name}</b></div>

        <div class="task">
          ${team.activeTask ? team.activeTask.text : "Нет активной"}
        </div>

        ${team.queue.map(t=>`
          <div class="small">⏳ ${t.text}</div>
        `).join("")}

      </div>
    `).join("")}

  </div>
  `;

  board.innerHTML = html;
}

render();
</script>

</body>
</html>
