<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Лёгкий чат</title>

  <style>
    body {
      margin:0;
      font-family: system-ui, Arial;
      background:#0b0f14;
      color:#fff;
    }

    .wrap {
      max-width: 700px;
      margin: 0 auto;
      height: 100vh;
      display:flex;
      flex-direction:column;
    }

    header {
      padding:12px;
      border-bottom:1px solid #1f2a44;
      background:#0d1422;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    #chat {
      flex:1;
      overflow:auto;
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .msg {
      padding:8px 10px;
      border-radius:10px;
      background:#111827;
      border:1px solid #1f2a44;
      max-width:80%;
    }

    .me {
      align-self:flex-end;
      background:#1e293b;
      border-color:#3b82f6;
    }

    .nick {
      font-size:12px;
      opacity:.7;
      margin-bottom:2px;
    }

    .input {
      display:flex;
      gap:8px;
      padding:12px;
      border-top:1px solid #1f2a44;
      background:#0d1422;
    }

    input {
      flex:1;
      padding:10px;
      border-radius:10px;
      border:1px solid #374151;
      background:#0b1220;
      color:#fff;
    }

    button {
      padding:10px 14px;
      border-radius:10px;
      border:0;
      background:#3b82f6;
      color:#fff;
      cursor:pointer;
    }

    .modal {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.85);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .box {
      background:#0d1422;
      padding:20px;
      border-radius:14px;
      border:1px solid #1f2a44;
      width:300px;
    }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      query,
      orderBy,
      onSnapshot,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    // 🔥 ТВОЙ Firebase (из проекта уже есть)
    const firebaseConfig = {
      apiKey: "AIzaSyAH58ZpWAp64mhM589KD6jXHcOlPqU0aYU",
      authDomain: "skladsborka-6c2a7.firebaseapp.com",
      projectId: "skladsborka-6c2a7",
      storageBucket: "skladsborka-6c2a7.appspot.com",
      messagingSenderId: "516526717198"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let nick = localStorage.getItem("nick") || "";

    const modal = document.getElementById("modal");
    const nickInput = document.getElementById("nickInput");
    const chat = document.getElementById("chat");
    const msgInput = document.getElementById("msgInput");

    if (nick) modal.style.display = "none";

    document.getElementById("enterBtn").onclick = () => {
      const v = nickInput.value.trim();
      if (!v) return;
      nick = v;
      localStorage.setItem("nick", nick);
      modal.style.display = "none";
    };

    // realtime чат
    const q = query(collection(db, "chat"), orderBy("createdAt"));

    onSnapshot(q, (snap) => {
      chat.innerHTML = "";
      snap.forEach(doc => {
        const d = doc.data();
        const div = document.createElement("div");
        div.className = "msg " + (d.nick === nick ? "me" : "");
        div.innerHTML = `
          <div class="nick">${d.nick}</div>
          <div>${d.text}</div>
        `;
        chat.appendChild(div);
      });
      chat.scrollTop = chat.scrollHeight;
    });

    async function send() {
      const text = msgInput.value.trim();
      if (!text) return;

      await addDoc(collection(db, "chat"), {
        text,
        nick,
        createdAt: serverTimestamp()
      });

      msgInput.value = "";
    }

    document.getElementById("sendBtn").onclick = send;

    msgInput.addEventListener("keydown", (e)=>{
      if (e.key === "Enter") send();
    });
  </script>
</head>

<body>
  <div class="wrap">

    <header>
      <div>💬 Лёгкий чат</div>
      <div id="me"></div>
    </header>

    <div id="chat"></div>

    <div class="input">
      <input id="msgInput" placeholder="Сообщение..." />
      <button id="sendBtn">Отправить</button>
    </div>

  </div>

  <!-- Nick modal -->
  <div class="modal" id="modal">
    <div class="box">
      <h3>Введите ник</h3>
      <input id="nickInput" placeholder="например: Склад1" />
      <br><br>
      <button id="enterBtn">Войти</button>
    </div>
  </div>

</body>
</html>
