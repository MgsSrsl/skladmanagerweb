<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Складская доска</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f4f6;
}

.toolbar{
  padding:12px;
  background:#111827;
  color:#fff;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  position:sticky;
  top:0;
}

input,button{
  padding:8px;
}

button{cursor:pointer}

#board{
  padding:16px;
}

/* заголовок таблицы */
.headerRow{
  display:flex;
  background:#e5e7eb;
  padding:10px;
  border-radius:10px;
  font-weight:bold;
  margin-bottom:10px;
}

.row{
  display:flex;
  background:#fff;
  margin-bottom:10px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,.1);
  padding:10px;
  align-items:flex-start;
}

.col{
  flex:1;
  padding:8px;
}

.teamName{
  font-weight:bold;
  margin-bottom:6px;
}

.task{
  background:#dbeafe;
  padding:6px;
  border-radius:6px;
  margin:4px 0;
  font-size:14px;
}

.small{
  font-size:12px;
  color:#555;
}

</style>
</head>

<body>

<div class="toolbar">
  <input id="workerName" placeholder="Название команды">
  <button onclick="addTeam()">Добавить команду</button>

  <input id="taskName" placeholder="Новая задача">
  <button onclick="addTask()">Добавить задачу</button>
</div>

<div id="board"></div>

<script>
const STORAGE="warehouse_board_v2";

let state = JSON.parse(localStorage.getItem(STORAGE)) || {
  teams:[
    {
      id: id(),
      name:"Команда 1",
      members:["Иван","Паша"],
      activeTask:null,
      queue:[]
    }
  ]
};

function id(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2);
}

function save(){
  localStorage.setItem(STORAGE,JSON.stringify(state));
}

/* ===== TEAMS ===== */

function addTeam(){
  const el=document.getElementById("workerName");
  const name=el.value.trim();
  if(!name)return;

  state.teams.push({
    id:id(),
    name,
    members:[],
    activeTask:null,
    queue:[]
  });

  el.value="";
  save();
  render();
}

/* ===== TASKS ===== */

function addTask(){
  const el=document.getElementById("taskName");
  const text=el.value.trim();
  if(!text)return;

  const teamName = prompt("Куда назначить задачу? (название команды)");

  const team = state.teams.find(t=>t.name===teamName);

  if(!team){
    alert("Команда не найдена");
    return;
  }

  const task = {id:id(), text};

  // если нет активной → ставим активной
  if(!team.activeTask){
    team.activeTask = task;
  }else{
    team.queue.push(task);
  }

  el.value="";
  save();
  render();
}

function completeTask(teamId){
  const team = state.teams.find(t=>t.id===teamId);
  if(!team) return;

  team.activeTask = team.queue.shift() || null;

  save();
  render();
}

/* ===== UI ===== */

function render(){
  const board=document.getElementById("board");

  let html = `
  <div class="headerRow">
    <div class="col">Активная задача</div>
    <div class="col">Команда</div>
    <div class="col">Следующая очередь</div>
  </div>
  `;

  state.teams.forEach(team=>{
    html += `
    <div class="row">

      <!-- ACTIVE -->
      <div class="col">
        ${
          team.activeTask
          ? `<div class="task">
              ${team.activeTask.text}
              <div class="small">
                <button onclick="completeTask('${team.id}')">Завершить</button>
              </div>
             </div>`
          : `<div class="small">Нет активной задачи</div>`
        }
      </div>

      <!-- TEAM -->
      <div class="col">
        <div class="teamName">${team.name}</div>
        <div class="small">
          ${team.members.length ? team.members.join(", ") : "Нет участников"}
        </div>
      </div>

      <!-- QUEUE -->
      <div class="col">
        ${
          team.queue.length
          ? team.queue.map(t=>`
              <div class="task">${t.text}</div>
            `).join("")
          : `<div class="small">Очередь пуста</div>`
        }
      </div>

    </div>
    `;
  });
  board.innerHTML = html;
}

render();
</script>

</body>
</html
