<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Складская доска</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f4f6;
}

.toolbar{
  padding:12px;
  background:#111827;
  color:#fff;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  position:sticky;
  top:0;
}

input,button{
  padding:8px;
}

button{
  cursor:pointer;
}

.board{
  display:flex;
  gap:12px;
  padding:16px;
}

.column{
  flex:1;
  background:#fff;
  border-radius:12px;
  padding:10px;
  min-height:300px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.title{
  font-weight:bold;
  margin-bottom:10px;
}

.task{
  background:#dbeafe;
  padding:8px;
  border-radius:8px;
  margin:6px 0;
  cursor:grab;
}

.small{
  font-size:12px;
  color:#555;
}
</style>
</head>

<body>

<div class="toolbar">
  <input id="workerName" placeholder="Кладовщик">
  <button onclick="addWorker()">Добавить кладовщика</button>

  <input id="taskName" placeholder="Задача">
  <button onclick="addTask()">Добавить задачу</button>
</div>

<div id="board"></div>

<script>

const STORAGE="warehouse_board_fixed_v1";

let state = JSON.parse(localStorage.getItem(STORAGE)) || {
  backlog:[
    {id:id(), text:"Разгрузка фуры"},
    {id:id(), text:"Сборка заказа"},
    {id:id(), text:"Приём возврата"}
  ],
  workers:[
    {id:id(), name:"Иван", tasks:[]},
    {id:id(), name:"Паша", tasks:[]}
  ]
};

function id(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2);
}

function save(){
  localStorage.setItem(STORAGE, JSON.stringify(state));
}

/* ===== ADD ===== */

function addWorker(){
  const el=document.getElementById("workerName");
  const name=el.value.trim();
  if(!name)return;

  state.workers.push({
    id:id(),
    name,
    tasks:[]
  });

  el.value="";
  save();
  render();
}

function addTask(){
  const el=document.getElementById("taskName");
  const text=el.value.trim();
  if(!text)return;

  state.backlog.push({
    id:id(),
    text
  });

  el.value="";
  save();
  render();
}

/* ===== DRAG ===== */

function dragStart(ev, id, from){
  ev.dataTransfer.setData("id", id);
  ev.dataTransfer.setData("from", from);
}

function allowDrop(ev){
  ev.preventDefault();
}

function drop(ev, to){
  ev.preventDefault();

  const id = ev.dataTransfer.getData("id");
  const from = ev.dataTransfer.getData("from");

  moveTask(id, from, to);
}

function moveTask(id, from, to){

  let task;

  // удалить откуда
  const remove = (arr)=>{
    const i = arr.findIndex(t=>t.id===id);
    if(i>=0) return arr.splice(i,1)[0];
  };

  if(from==="backlog"){
    task = remove(state.backlog);
  }

  state.workers.forEach(w=>{
    if(from===w.id){
      const i = w.tasks.findIndex(t=>t.id===id);
      if(i>=0) task = w.tasks.splice(i,1)[0];
    }
  });

  if(!task) return;

  // положить куда
  if(to==="backlog"){
    state.backlog.push(task);
  } else {
    const w = state.workers.find(x=>x.id===to);
    if(w) w.tasks.push(task);
  }

  save();
  render();
}

/* ===== RENDER ===== */

function taskHtml(t, from){
  return `
    <div class="task"
      draggable="true"
      ondragstart="dragStart(event,'${t.id}','${from}')">
      ${t.text}
    </div>
  `;
}

function render(){
  const board=document.getElementById("board");

  board.innerHTML=`
  <div class="board">

    <!-- ВСЕ ЗАДАЧИ -->
    <div class="column"
      ondrop="drop(event,'backlog')"
      ondragover="allowDrop(event)">
      <div class="title">📦 Все задачи</div>

      ${state.backlog.map(t=>taskHtml(t,"backlog")).join("")}
    </div>

    <!-- АКТИВНЫЕ -->
    <div class="column">
      <div class="title">🔥  Активные</div>

      ${state.workers.map(w=>{
        const active = w.tasks[0];
        if(!active) return "";
        return `
          <div class="task"
            draggable="true"
            ondragstart="dragStart(event,'${active.id}','${w.id}')">
            ${active.text}
            <div class="small">${w.name}</div>
          </div>
        `;
      }).join("")}
    </div>

    <!-- ОЧЕРЕДЬ -->
    <div class="column">
      <div class="title">➡️  Очередь</div>

      ${state.workers.map(w=>{
        return w.tasks.slice(1).map(t=>`
          <div class="task"
            draggable="true"
            ondragstart="dragStart(event,'${t.id}','${w.id}')">
            ${t.text}
            <div class="small">${w.name}</div>
          </div>
        `).join("");
      }).join("")}

    </div>

  </div>
  `;

}

render();

</script>

</body>
</html>
