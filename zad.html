<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Складская доска PRO</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f4f6;
}

.toolbar{
  padding:12px;
  background:#111827;
  color:#fff;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  position:sticky;
  top:0;
}

input,button{padding:8px}
button{cursor:pointer}

#board{
  display:flex;
  gap:12px;
  padding:12px;
  overflow:auto;
}

.column{
  background:#fff;
  border-radius:12px;
  padding:10px;
  width:260px;
  min-height:300px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.title{
  font-weight:bold;
  margin-bottom:10px;
  font-size:14px;
}

.item{
  background:#dbeafe;
  padding:8px;
  border-radius:8px;
  margin:6px 0;
  cursor:grab;
  font-size:13px;
}

.small{
  font-size:11px;
  color:#555;
}
</style>
</head>

<body>

<div class="toolbar">
  <input id="personName" placeholder="Кладовщик / грузчик">
  <button onclick="addPerson()">Добавить человека</button>

  <input id="taskName" placeholder="Задача">
  <button onclick="addTask()">Добавить задачу</button>
</div>

<div id="board"></div>

<script>
const STORAGE="warehouse_pro_v1";

let state = JSON.parse(localStorage.getItem(STORAGE)) || {
  people:[
    {id:id(),name:"Иван",role:"кладовщик"},
    {id:id(),name:"Паша",role:"грузчик"}
  ],
  tasks:[
    {id:id(),text:"Разгрузка фуры"},
    {id:id(),text:"Сборка заказа"},
    {id:id(),text:"Приём возврата"}
  ],
  active:[],
  queue:[]
};

function id(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2);
}

function save(){
  localStorage.setItem(STORAGE,JSON.stringify(state));
}

/* ===== ADD ===== */

function addPerson(){
  const el=document.getElementById("personName");
  const name=el.value.trim();
  if(!name)return;

  state.people.push({
    id:id(),
    name,
    role:"сотрудник"
  });

  el.value="";
  save();render();
}

function addTask(){
  const el=document.getElementById("taskName");
  const text=el.value.trim();
  if(!text)return;

  state.tasks.push({id:id(),text});
  el.value="";
  save();render();
}

/* ===== DRAG ===== */

function dragStart(ev,id,from){
  ev.dataTransfer.setData("id",id);
  ev.dataTransfer.setData("from",from);
}

function allowDrop(ev){
  ev.preventDefault();
}

function drop(ev,to){
  ev.preventDefault();

  const id=ev.dataTransfer.getData("id");
  const from=ev.dataTransfer.getData("from");

  move(id,from,to);
}

function move(id,from,to){

  let item;

  const remove=(arr)=>{
    const i=arr.findIndex(x=>x.id===id);
    if(i>=0) return arr.splice(i,1)[0];
  };

  if(from==="people") item=remove(state.people);
  if(from==="tasks") item=remove(state.tasks);
  if(from==="active") item=remove(state.active);
  if(from==="queue") item=remove(state.queue);

  if(!item) return;

  if(to==="people") state.people.push(item);
  if(to==="tasks") state.tasks.push(item);
  if(to==="active") state.active.push(item);
  if(to==="queue") state.queue.push(item);

  save();
  render();
}

/* ===== UI ===== */

function render(){

  const board=document.getElementById("board");

  board.innerHTML=`

  <div class="column" ondrop="drop(event,'people')" ondragover="allowDrop(event)">
    <div class="title">👷  Люди</div>
    ${state.people.map(p=>`
      <div class="item" draggable="true"
        ondragstart="dragStart(event,'${p.id}','people')">
        ${p.name} <div class="small">${p.role}</div>
      </div>
    `).join("")}
  </div>

  <div class="column" ondrop="drop(event,'active')" ondragover="allowDrop(event)">
    <div class="title">🔥  Активные задачи</div>
    ${state.active.map(t=>`
      <div class="item" draggable="true"
        ondragstart="dragStart(event,'${t.id}','active')">
        ${t.text}
      </div>
    `).join("")}
  </div>

  <div class="column" ondrop="drop(event,'queue')" ondragover="allowDrop(event)">
    <div class="title">⏭ Команда / выполнение</div>
    ${state.queue.map(t=>`<div class="item" draggable="true"
        ondragstart="dragStart(event,'${t.id}','queue')">
        ${t.text}
      </div>
    `).join("")}
  </div>

  <div class="column" ondrop="drop(event,'tasks')" ondragover="allowDrop(event)">
    <div class="title">📦 Все задачи</div>
    ${state.tasks.map(t=>`
      <div class="item" draggable="true"
        ondragstart="dragStart(event,'${t.id}','tasks')">
        ${t.text}
      </div>
    `).join("")}
  </div>

  `;

}

render();
</script>

</body>
</html>
