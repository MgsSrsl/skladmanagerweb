<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PWA проверка — Акты Docke</title><meta name="theme-color" content="#111827"><link rel="manifest" href="./manifest.webmanifest"><style>body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:0;background:#f3f4f6;color:#111827}.wrap{max-width:820px;margin:0 auto;padding:24px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.06)}.ok{color:#059669;font-weight:800}.bad{color:#dc2626;font-weight:800}.row{padding:10px 0;border-bottom:1px solid #e5e7eb}.btn{border:0;border-radius:12px;padding:10px 14px;font-weight:800;background:#111827;color:white;cursor:pointer}</style></head><body><main class="wrap"><div class="card"><h1>PWA проверка</h1><div id="out">Проверяю...</div><p><button class="btn" onclick="location.reload()">Обновить проверку</button> <a href="./">На главный экран</a></p></div></main><script>
async function run(){const rows=[];function add(name,ok,info=''){rows.push(`<div class="row"><span class="${ok?'ok':'bad'}">${ok?'✓':'✕'}</span> <b>${name}</b><br><small>${info}</small></div>`)}
add('HTTPS или localhost', location.protocol==='https:'||location.hostname==='localhost', location.href);
add('Manifest подключен', !!document.querySelector('link[rel="manifest"]'), document.querySelector('link[rel="manifest"]')?.href||'нет');
add('Service Worker поддерживается', 'serviceWorker' in navigator, navigator.userAgent);
try{ if('serviceWorker' in navigator){ const reg=await navigator.serviceWorker.register('./sw.js',{scope:'./'}); await navigator.serviceWorker.ready; add('Service Worker зарегистрирован', true, reg.scope); } }catch(e){ add('Service Worker зарегистрирован', false, String(e)); }
try{ const m=await fetch('./manifest.webmanifest',{cache:'no-store'}).then(r=>r.json()); add('Manifest читается', !!m.name, JSON.stringify({name:m.name,start_url:m.start_url,scope:m.scope,display:m.display})); }catch(e){ add('Manifest читается', false, String(e)); }
add('Режим приложения', matchMedia('(display-mode: standalone)').matches, matchMedia('(display-mode: standalone)').matches?'уже standalone':'браузерная вкладка');
document.getElementById('out').innerHTML=rows.join('')+'<p><b>Для Edge:</b> открой /acts/, обнови страницу, потом нажми кнопку «Установить приложение» на странице. Если Edge управляется организацией, установка может быть отключена политикой.</p>';}
run();</script></body></html>
