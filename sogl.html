<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Создать задание — СкладСборка</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <meta http-equiv="Cache-Control" content="no-store" />

  <style>
    :root{
      --brand-red:#FF3B30; --text:#0d0d0d; --muted:#666; --line:rgba(0,0,0,.08);
      --glass:#fff; --bg:#f5f6f8;
    }
    *{ box-sizing:border-box }
    body{ margin:0; font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial; background:var(--bg); color:var(--text) }
    .shell{ max-width:1120px; margin:0 auto; padding:20px 14px 120px }
    h1{ margin:6px 0 18px; font-size:28px; font-weight:800 }

    .grid{ display:grid; grid-template-columns:1fr 440px; gap:16px; align-items:start }
    @media (max-width:980px){ .grid{ grid-template-columns:1fr } }

    .card{ background:var(--glass); border:1px solid rgba(0,0,0,.06); border-radius:16px; padding:16px }
    label{ font-weight:600; font-size:14px; display:block; margin:12px 0 6px }
    input[type="text"], textarea, select{
      width:100%; padding:12px 14px; border-radius:12px; border:1px solid rgba(0,0,0,.12); font:inherit; background:#fff
    }
    textarea{ min-height:96px; resize:vertical }
    .row{ display:grid; grid-template-columns:1fr 1fr; gap:12px }
    .muted{ color:var(--muted); font-size:13px }
    .btn{ border:none; background:var(--brand-red); color:#fff; padding:12px 14px; border-radius:12px; font-weight:800; cursor:pointer }
    .btn-secondary{ background:#fff; color:var(--text); border:1px solid rgba(0,0,0,.12) }

    .switch{ display:flex; align-items:center; gap:10px; margin-top:10px }

    .pill{ font-size:11px; font-weight:700; padding:4px 8px; border-radius:999px; border:1px solid var(--line); background:#fafafa }
    .pill.warn{ color:#7c2d12; background:#fffbeb; border-color:#fde68a }
    .pill.blue{ color:#1e40af; background:#eff6ff; border-color:#bfdbfe }

    .tasklist{
      display:flex; flex-direction:column; gap:10px;
      max-height:82vh; overflow:auto;
    }

    .task{
      border:1px solid var(--line);
      background:#fff;
      border-radius:14px;
      padding:10px 12px;
    }

    .aside{ position:sticky; top:12px }

    .split-title{
      font-weight:800;
      margin:8px 0;
    }
  </style>
</head>

<body>
<div class="shell">
  <h1>Создать задание</h1>

  <div class="grid">

    <!-- LEFT -->
    <div class="card">

      <label>Название</label>
      <input id="title" type="text">

      <label>Комментарий</label>
      <textarea id="comment"></textarea>

      <!-- 🔥 НОВЫЕ ЧЕКБОКСЫ -->
      <div class="switch">
        <input id="cbDelivery" type="checkbox">
        <label style="margin:0">Доставка</label>
      </div>

      <div class="switch">
        <input id="cbApproval" type="checkbox">
        <label style="margin:0">Согласование</label>
      </div>

      <button id="btnSave" class="btn" type="button">Сохранить</button>

    </div>

    <!-- RIGHT -->
    <aside class="aside">

      <div class="split-title">Обычные задачи</div>
      <div id="tasklist" class="tasklist card"></div>

      <!-- 🔥 НОВЫЙ СТОЛБИК -->
      <div class="split-title">Согласование / Доставка</div>
      <div id="specialTasklist" class="tasklist card"></div>

    </aside>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAH58ZpWAp64mhM589KD6jXHcOlPqU0aYU",
  authDomain: "skladsborka-6c2a7.firebaseapp.com",
  projectId: "skladsborka-6c2a7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const SPECIAL_USERS = ["login", "Павел"];
  const els = {
  title: document.getElementById("title"),
  comment: document.getElementById("comment"),
  cbDelivery: document.getElementById("cbDelivery"),
  cbApproval: document.getElementById("cbApproval"),
  btnSave: document.getElementById("btnSave"),
  tasklist: document.getElementById("tasklist"),
  specialTasklist: document.getElementById("specialTasklist")
};

let lastTasks = [];

els.btnSave.onclick = async () => {

  const title = els.title.value.trim();
  const comment = els.comment.value.trim();

  let category = "default";
  let assignees = [];

  // 🔥 ЛОГИКА НОВЫХ ТИПОВ
  if (els.cbDelivery.checked) {
    category = "delivery";
    assignees = SPECIAL_USERS;
  }

  if (els.cbApproval.checked) {
    category = "approval";
    assignees = SPECIAL_USERS;
  }

  await db.collection("tasks").add({
    title,
    comment,
    category,
    assignees,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    status: "assigned"
  });

  els.title.value = "";
  els.comment.value = "";
  els.cbDelivery.checked = false;
  els.cbApproval.checked = false;
};

db.collection("tasks")
  .orderBy("createdAt","desc")
  .limit(50)
  .onSnapshot(snap => {

    const normal = [];
    const special = [];

    snap.forEach(d => {
      const x = d.data();

      const task = {
        id: d.id,
        title: x.title,
        comment: x.comment,
        category: x.category || "default"
      };

      if (task.category === "delivery" || task.category === "approval") {
        special.push(task);
      } else {
        normal.push(task);
      }
    });

    render(normal, els.tasklist);
    render(special, els.specialTasklist);
  });

function render(arr, el){
  el.innerHTML = "";
  arr.forEach(t => {
    const div = document.createElement("div");
    div.className = "task";
    div.innerHTML = 
      <div style="font-weight:700">${t.title}</div>
      <div class="muted">${t.comment || ""}</div>
      <div style="margin-top:6px">
        ${t.category === "delivery" ? <span class="pill warn">Доставка</span> : ""}
        ${t.category === "approval" ? <span class="pill blue">Согласование</span> : ""}
      </div>
    ;
    el.appendChild(div);
  });
}
</script>

</body>
</html>
