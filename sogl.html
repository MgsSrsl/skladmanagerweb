<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Создать задание — СкладСборка</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --brand-red:#FF3B30;
  --text:#0d0d0d;
  --muted:#666;
  --line:rgba(0,0,0,.08);
  --glass:#fff;
  --bg:#f5f6f8;
}

*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--text)}

.shell{max-width:1120px;margin:0 auto;padding:20px 14px 120px}
h1{margin:6px 0 18px;font-size:28px;font-weight:800}

/* 🔥 3 КОЛОНКИ */
.grid{
  display:grid;
  grid-template-columns:260px 1fr 440px;
  gap:16px;
}

@media (max-width:980px){
  .grid{grid-template-columns:1fr}
}

.card{
  background:var(--glass);
  border:1px solid rgba(0,0,0,.06);
  border-radius:16px;
  padding:16px;
}

label{font-weight:600;font-size:14px;display:block;margin:12px 0 6px}

input,textarea,select{
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid rgba(0,0,0,.12);
  font:inherit;
  background:#fff;
}

textarea{min-height:96px;resize:vertical}

.switch{display:flex;align-items:center;gap:10px;margin-top:10px}

.btn{
  border:none;
  background:var(--brand-red);
  color:#fff;
  padding:12px 14px;
  border-radius:12px;
  font-weight:800;
  cursor:pointer;
}

.btn-secondary{
  background:#fff;
  color:#000;
  border:1px solid rgba(0,0,0,.12);
}

.task{
  border:1px solid var(--line);
  background:#fff;
  border-radius:14px;
  padding:10px 12px;
  margin-bottom:8px;
}

.task .title{font-weight:700;font-size:14px}

.muted{color:var(--muted);font-size:12px}
</style>
</head>

<body>

<div class="shell">
<h1>Создать задание</h1>

<div class="grid">

<!-- 🟦 ЛЕВАЯ КОЛОНКА (НОВАЯ) -->
<aside class="card">
  <div style="font-weight:800;margin-bottom:10px">
    Доставка / Согласование
  </div>
  <div id="specialTasks"></div>
</aside>

<!-- 🟨 ОСНОВНАЯ ФОРМА -->
<div class="card">

<label>Название задания</label>
<input id="title" type="text"/>

<label>Комментарий</label>
<textarea id="comment"></textarea>

<div class="switch">
  <input id="cbAssembled" type="checkbox"/>
  <label style="margin:0">Собранный заказ</label>
</div>

<!-- 🔥 ДОБАВЛЕНО -->
<div class="switch">
  <input id="cbDelivery" type="checkbox"/>
  <label style="margin:0">Доставка</label>
</div>

<div class="switch">
  <input id="cbApproval" type="checkbox"/>
  <label style="margin:0">Согласование</label>
</div>

<label>Кладовщики</label>
<div id="users" class="card" style="padding:8px;height:180px;overflow:auto"></div>

<button id="btnSave" class="btn">Сохранить</button>

</div>

<!-- 🟥 ПРАВАЯ КОЛОНКА -->
<aside class="card">
  <div style="font-weight:800">Задачи</div>
  <div id="tasklist"></div>
</aside>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey:"XXX",
  authDomain:"XXX",
  projectId:"XXX"
});

const db=firebase.firestore();
const auth=firebase.auth();

/* ===================== UI ===================== */
const els={
  title:document.getElementById('title'),
  comment:document.getElementById('comment'),
  cbAssembled:document.getElementById('cbAssembled'),
  cbDelivery:document.getElementById('cbDelivery'),
  cbApproval:document.getElementById('cbApproval'),
  users:document.getElementById('users'),
  tasklist:document.getElementById('tasklist'),
  specialTasks:document.getElementById('specialTasks'),
  btnSave:document.getElementById('btnSave')
};

/* ===================== STATE ===================== */
let selectedWorkerIds=new Set();
let selectedWorkerNames=new Set();
let lastTasks=[];

const SPECIAL_IDS=["login","pavel"];
const SPECIAL_NAMES=["login","Павел"];

/* ===================== AUTH ===================== */
auth.signInAnonymously().then(()=>{
  loadUsers();
  subscribeTasks();
});

/* ===================== USERS ===================== */
function loadUsers(){
  db.collection("users").get().then(snap=>{
    els.users.innerHTML="";
    snap.forEach(d=>{
      const u=d.data();
      const id=d.id;
      const label=u.name||id;

      const row=document.createElement("div");
      row.innerHTML=`
        <label>
          <input type="checkbox">
          ${label}
        </label>
      `;

      row.querySelector("input").onchange=(e)=>{
        if(e.target.checked){
          selectedWorkerIds.add(id);
          selectedWorkerNames.add(label);
        }else{
          selectedWorkerIds.delete(id);
          selectedWorkerNames.delete(label);
        }
      };

      els.users.appendChild(row);
    });
  });
}

/* ===================== SAVE ===================== */
els.btnSave.onclick=async()=>{

  const title=els.title.value.trim();
  if(!title) return;

  const isSpecial =
    els.cbDelivery.checked || els.cbApproval.checked;

  let audienceIds=[...selectedWorkerIds];
  let audienceNames=[...selectedWorkerNames];

  if(isSpecial){
    audienceIds=[...SPECIAL_IDS];
    audienceNames=[...SPECIAL_NAMES];
  }

  const category =
    els.cbDelivery.checked ? "delivery"
    : els.cbApproval.checked ? "approval"
    : "normal";

  const ref=db.collection("tasks").doc();

  await ref.set({
    title,
    comment:els.comment.value,
    assignees:audienceIds,
    assigneeNames:audienceNames,
    category,
    status:"assigned",
    createdAt:new Date()
  });

  els.title.value="";
  els.comment.value="";
  els.cbDelivery.checked=false;
  els.cbApproval.checked=false;
});

/* ===================== TASK FEED ===================== */
function subscribeTasks(){
  db.collection("tasks")
    .orderBy("createdAt","desc")
    .limit(50)
    .onSnapshot(snap=>{
      lastTasks=[];
      snap.forEach(d=>{
        lastTasks.push({id:d.id,...d.data()});
      });

      render();
    });
}

/* ===================== RENDER ===================== */
function render(){

  els.tasklist.innerHTML="";
  els.specialTasks.innerHTML="";

  const special = lastTasks.filter(t =>
    t.category==="delivery" ||
    t.category==="approval"
  );

  for(const t of lastTasks){
    const div=document.createElement("div");
    div.className="task";
    div.innerHTML=`<div class="title">${t.title}</div>`;
    els.tasklist.appendChild(div);
  }

  for(const t of special){
    const div=document.createElement("div");
    div.className="task";
    div.innerHTML=`
      <div class="title">${t.title}</div>
      <div class="muted">${t.category}</div>
    `;
    els.specialTasks.appendChild(div);
  }
}

</script>
</body>
</html>
