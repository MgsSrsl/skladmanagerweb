

<!doctype html>
<html lang="ru">
<head>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />

<title>Согласование клиента — СкладСборка</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<meta http-equiv="Cache-Control" content="no-store" />

<style>

:root{
  --brand-red:#FFB020;
  --text:#0d0d0d;
  --muted:#666;
  --line:rgba(0,0,0,.08);
  --glass:#fff;
  --bg:#f5f6f8;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:var(--bg);
  color:var(--text);
}

.shell{
  max-width:1120px;
  margin:0 auto;
  padding:20px 14px 120px;
}

h1{
  margin:6px 0 18px;
  font-size:28px;
  font-weight:800;
}

.grid{
  display:grid;
  grid-template-columns:1fr 440px;
  gap:16px;
  align-items:start;
}

@media (max-width:980px){
  .grid{
    grid-template-columns:1fr;
  }
}

.card{
  background:var(--glass);
  border:1px solid rgba(0,0,0,.06);
  border-radius:16px;
  padding:16px;
}

label{
  font-weight:600;
  font-size:14px;
  display:block;
  margin:12px 0 6px;
}

input[type="text"],
textarea{
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid rgba(0,0,0,.12);
  font:inherit;
  background:#fff;
}

textarea{
  min-height:120px;
  resize:vertical;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.muted{
  color:var(--muted);
  font-size:13px;
}

.btn{
  border:none;
  background:var(--brand-red);
  color:#000;
  padding:12px 14px;
  border-radius:12px;
  font-weight:800;
  cursor:pointer;
}

.btn:disabled{
  opacity:.6;
  cursor:not-allowed;
}

.btn-secondary{
  background:#fff;
  color:var(--text);
  border:1px solid rgba(0,0,0,.12);
}

.drop{
  padding:12px;
  border:2px dashed rgba(0,0,0,.2);
  border-radius:12px;
  background:#fff;
}

.drop.drag{
  background:#f8fbff;
  border-color:#3d7bfd;
}

.files{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:8px;
}

.chip{
  display:inline-flex;
  gap:8px;
  align-items:center;
  background:#fff;
  border:1px solid rgba(0,0,0,.12);
  padding:8px 10px;
  border-radius:12px;
}

.chip button{
  border:none;
  background:transparent;
  font-weight:800;
  cursor:pointer;
}

.footer{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:#fff;
  border-top:1px solid var(--line);
  padding:12px;
}

.footer .inner{
  max-width:1120px;
  margin:0 auto;
  display:flex;
  gap:10px;
  justify-content:flex-end;
}

.updated{
  position:fixed;
  right:14px;
  bottom:70px;
  font-size:13px;
  color:#222;
  opacity:.8;
}

/* задачи */

.aside{
  position:sticky;
  top:12px;
}

.aside .hdr{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}

.tasklist{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-height:82vh;
  overflow-y:auto;
  overflow-x:hidden;
  padding-right:2px;
}

.task{
  border:1px solid var(--line);
  background:#fff;
  border-radius:14px;
  padding:10px 12px;
  display:grid;
  gap:6px;
}

.task .title{
  font-weight:700;
  font-size:14px;
}

.task .meta{
  font-size:12px;
  color:#555;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.task:hover{
  box-shadow:0 1px 0 rgba(0,0,0,.02), 0 6px 16px rgba(0,0,0,.06);
}

.pill{
  font-size:11px;
  font-weight:700;
  padding:4px 8px;
  border-radius:999px;
  background:#fff4d6;
}

</style>

</head>

<body>

<div class="shell">

  <h1>Согласование клиента</h1>

  <div class="grid">

    <!-- LEFT -->

    <div>

      <div class="card">

        <label for="title">
          Название
        </label>

        <input
          id="title"
          type="text"
          placeholder="Номер заказа: Прошу согласовать"
        />

        <label for="comment">
          Комментарий
        </label>
 <textarea
          id="comment"
          placeholder="Описание согласования"
        ></textarea>

        <label>
          Файлы
        </label>

        <div id="drop" class="drop">

          <input
            id="fileInput"
            type="file"
            multiple
            accept="image/*,application/pdf,.pdf"
          />

          <div class="muted">
            Выберите, перетащите или вставьте Ctrl+V
          </div>

        </div>

        <div id="files" class="files"></div>

        <div id="filesInfo" class="muted">
          Файлы не выбраны
        </div>

      </div>

    </div>

    <!-- RIGHT -->

    <aside class="aside">

      <div class="card">

        <div class="hdr">

          <div style="font-weight:800">
            Последние согласования
          </div>

          <button
            id="btnReload"
            class="btn btn-secondary"
          >
            Обновить
          </button>

        </div>

        <div
          id="tasklist"
          class="tasklist"
        ></div>

      </div>

    </aside>

  </div>

  <div
    class="updated"
    id="tvHomeLastUpdated"
  >
    Список актуален: —
  </div>

</div>

<div class="footer">

  <div class="inner">

    <button
      id="btnClear"
      class="btn btn-secondary"
      type="button"
    >
      Очистить файлы
    </button>

    <button
      id="btnSave"
      class="btn"
      type="button"
    >
      Отправить на согласование
    </button>

  </div>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAH58ZpWAp64mhM589KD6jXHcOlPqU0aYU",
  authDomain: "skladsborka-6c2a7.firebaseapp.com",
  projectId: "skladsborka-6c2a7",
  storageBucket: "skladsborka-6c2a7.firebasestorage.app",
  appId: "1:516526717198:android:e470c17aed370572757f5f"
};

const CLOUDINARY_CLOUD_NAME = "dnx1taqp7";
const CLOUDINARY_UPLOAD_PRESET = "unsigned_tasks";
const FOLDER_PREFIX = "tasks";

const NOTIFY_URL_CREATED =
"https://skladsborka-notify.vercel.app/api/notify-taskCreated";

firebase.initializeApp(FIREBASE_CONFIG);

const auth = firebase.auth();
const db = firebase.firestore();

const LOGIN_UID = "LOGIN_UID";
const PAVEL_UID = "PAVEL_UID";

const selectedFiles = [];

const els = {
  title: document.getElementById('title'),
  comment: document.getElementById('comment'),
  fileInput: document.getElementById('fileInput'),
  files: document.getElementById('files'),
  filesInfo: document.getElementById('filesInfo'),
  btnSave: document.getElementById('btnSave'),
  btnClear: document.getElementById('btnClear'),
  drop: document.getElementById('drop'),
  tasklist: document.getElementById('tasklist'),
  btnReload: document.getElementById('btnReload'),
  tvHomeLastUpdated: document.getElementById('tvHomeLastUpdated')
};

auth.signInAnonymously()
.then(()=>{
  initTasksFeed();
  touchLastUpdated();
});

els.fileInput.addEventListener('change', e=>{

  [...(e.target.files||[])].forEach(f=>{

    if(!selectedFiles.includes(f)){
      selectedFiles.push(f);
    }

  });

  renderFiles();

});

['dragenter','dragover'].forEach(ev=>
  els.drop.addEventListener(ev,e=>{

    e.preventDefault();
    e.stopPropagation();

    els.drop.classList.add('drag');

  })
);

['dragleave','drop'].forEach(ev=>
  els.drop.addEventListener(ev,e=>{

    e.preventDefault();
    e.stopPropagation();

    els.drop.classList.remove('drag');

  })
);

els.drop.addEventListener('drop', e=>{

  const files = [...(e.dataTransfer?.files||[])];

  files.forEach(f=>{

    if(!selectedFiles.includes(f)){
      selectedFiles.push(f);
    }

  });

  renderFiles();

});

document.addEventListener('paste', e=>{

  const dt = e.clipboardData;

  if(!dt) return;

  for(const item of dt.items || []){

    if(item.kind === 'file'){

      const file = item.getAsFile();
[20.05.2026 14:01] Глеб: if(!file) continue;

      selectedFiles.push(file);

    }

  }

  renderFiles();

});

els.btnClear.addEventListener('click', ()=>{

  selectedFiles.length = 0;

  renderFiles();

});

function renderFiles(){

  els.files.innerHTML='';

  selectedFiles.forEach((f,i)=>{

    const chip = document.createElement('span');

    chip.className='chip';

    chip.innerHTML = 
      <span>${escapeHtml(short(f.name))}</span>
      <button>&times;</button>
    ;

    chip.querySelector('button').onclick=()=>{

      selectedFiles.splice(i,1);

      renderFiles();

    };

    els.files.appendChild(chip);

  });

  els.filesInfo.textContent =
    selectedFiles.length
      ? Файлов: ${selectedFiles.length}
      : 'Файлы не выбраны';

}

els.btnSave.addEventListener('click', onSave);

async function onSave(){

  const title = els.title.value.trim();
  const comment = els.comment.value.trim();

  if(!title){

    alert('Введите название');

    return;

  }

  freeze(true);

  try{

    const audienceIds = [
      LOGIN_UID,
      PAVEL_UID
    ];

    const audienceNames = [
      "login",
      "Павел"
    ];

    const taskRef = db.collection('tasks').doc();

    await taskRef.set({

      title,
      comment,

      approvalTask: true,

      assignees: audienceIds,
      assigneeNames: audienceNames,

      category: "approval",

      status: "assigned",

      isPickup: false,
      assembledOrder: false,

      createdAt:
        firebase.firestore.FieldValue.serverTimestamp(),

      creatorId: "approval_page",
      creatorName: "approval_page",

      files: []

    });

    if(selectedFiles.length){

      const uploaded =
        await uploadAllFiles(
          taskRef.id,
          selectedFiles
        );

      if(uploaded.length){

        await taskRef.update({
          files: uploaded
        });

      }

    }

    await notifyTaskCreated(
      taskRef.id,
      audienceIds
    );

    selectedFiles.length = 0;

    renderFiles();

    els.fileInput.value = '';

    els.title.value = '';
    els.comment.value = '';

    alert('Согласование отправлено');

  }catch(e){

    alert(
      'Ошибка: ' + (e?.message || e)
    );

  }finally{

    freeze(false);

  }

}

async function uploadAllFiles(taskId, files){

  const out = [];

  for(const f of files){

    const endpoint =
      https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload;

    const fd = new FormData();

    fd.append('file', f);

    fd.append(
      'upload_preset',
      CLOUDINARY_UPLOAD_PRESET
    );

    fd.append(
      'folder',
      ${FOLDER_PREFIX}/${taskId}
    );

    const resp =
      await fetch(endpoint,{
        method:'POST',
        body:fd
      });

    if(!resp.ok){

      throw new Error('upload failed');

    }

    const j = await resp.json();

    out.push({

      url: j.secure_url  j.url  "",
      publicId: j.public_id || "",

      type:
        (f.type==='application/pdf' ||
        /\.pdf$/i.test(f.name))
          ? "pdf"
          : "image",

      name: f.name || "file"

    });

  }

  return out;

}

async function notifyTaskCreated(
  taskId,
  audienceIds
){

  const body =
    new URLSearchParams({
      taskId,
      assigneeIds:
        audienceIds.join(",")
    });

  try{

    await fetch(
      NOTIFY_URL_CREATED,
      {
        method:'POST',
        headers:{
          'Content-Type':
          'application/x-www-form-urlencoded'
        },
        body
      }
    );

  }catch(e){

    console.error(e);

  }

}

function freeze(flag){

  els.btnSave.disabled = flag;

  els.btnSave.textContent =
    flag
      ? 'Отправка...'
      : 'Отправить на согласование';

}

function initTasksFeed(){

  els.btnReload.addEventListener(
    'click',
    subscribeTasks
  );

  subscribeTasks();

}

function subscribeTasks(){

  db.collection('tasks')
    .where('approvalTask','==',true)
    .orderBy('createdAt','desc')
    .limit(50)
    .onSnapshot(snap=>{

      const arr = [];

      snap.forEach(d=>{
[20.05.2026 14:01] Глеб: arr.push({
          id:d.id,
          ...d.data()
        });

      });

      renderTasks(arr);

      touchLastUpdated();

    });

}

function renderTasks(tasks){

  els.tasklist.innerHTML='';

  if(!tasks.length){

    els.tasklist.innerHTML =
      '<div class="muted">Нет согласований</div>';

    return;

  }

  tasks.forEach(t=>{

    const div = document.createElement('div');

    div.className='task';

    const created =
      t.createdAt?.toDate
        ? formatTime(t.createdAt.toDate())
        : '—';

    div.innerHTML = 

      <div class="title">
        ${escapeHtml(t.title)}
      </div>

      <div class="meta">

        <span class="pill">
          СОГЛАСОВАНИЕ
        </span>

        <span>
          ${created}
        </span>

      </div>

      ${
        t.comment
        ? 
          <div>
            ${escapeHtml(t.comment)}
          </div>
        
        : ''
      }

    ;

    els.tasklist.appendChild(div);

  });

}

function formatTime(d){

  const pad=n=>
    String(n).padStart(2,'0');

  return 
    ${pad(d.getDate())}.
    ${pad(d.getMonth()+1)}
    ${pad(d.getHours())}:
    ${pad(d.getMinutes())}
  ;

}

function touchLastUpdated(){

  const d = new Date();

  const pad=n=>
    String(n).padStart(2,'0');

  els.tvHomeLastUpdated.textContent =
    Список актуален: ${
      pad(d.getDate())
    }.${
      pad(d.getMonth()+1)
    } ${
      pad(d.getHours())
    }:${
      pad(d.getMinutes())
    };

}

const short=s=>
  s.length>36
    ? (s.slice(0,16)+'…'+s.slice(-16))
    : s;

function escapeHtml(s){

  return String(s||'')
    .replace(/[&<>"']/g,c=>({
      '&':'&amp;',
      '<':'&lt;',
      '>':'&gt;',
      '"':'&quot;',
      "'":'&#039;'
    }[c]));

}

</script>

</body>
</html>
