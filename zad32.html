<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Складская доска</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f4f6;
}

.toolbar{
  padding:12px;
  background:#111827;
  color:#fff;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  position:sticky;
  top:0;
}

input,button{ padding:8px; }
button{ cursor:pointer }

#board{
  display:flex;
  gap:12px;
  padding:16px;
}

.column{
  flex:1;
  background:#fff;
  border-radius:12px;
  padding:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.title{
  font-weight:bold;
  margin-bottom:10px;
  border-bottom:1px solid #ddd;
  padding-bottom:6px;
}

.task,.team{
  background:#e0f2fe;
  padding:8px;
  margin:6px 0;
  border-radius:8px;
  font-size:14px;
  position:relative;
}

.team{ background:#e5e7eb; }

.btn{
  position:absolute;
  right:6px;
  top:6px;
  border:none;
  background:#ef4444;
  color:#fff;
  border-radius:6px;
  padding:2px 6px;
  font-size:12px;
  cursor:pointer;
}

.edit{
  position:absolute;
  right:34px;
  top:6px;
  border:none;
  background:#3b82f6;
  color:#fff;
  border-radius:6px;
  padding:2px 6px;
  font-size:12px;
  cursor:pointer;
}

.dropzone.dragover{
  outline:2px dashed #3b82f6;
}
</style>
</head>

<body>

<div class="toolbar">
  <input id="teamName" placeholder="Команда">
  <input id="teamMembers" placeholder="Участники через ,">
  <button onclick="addTeam()">Добавить команду</button>

  <input id="taskName" placeholder="Задача">
  <button onclick="addTask()">Добавить задачу</button>
</div>

<div id="board"></div>

<script>
const STORAGE="warehouse_board_v8";

let state = JSON.parse(localStorage.getItem(STORAGE)) || {
  teams:[],
  unassigned:[]
};

function id(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2);
}

function save(){
  localStorage.setItem(STORAGE,JSON.stringify(state));
}

/* ===== ADD ===== */

function addTeam(){
  const name=document.getElementById("teamName").value.trim();
  const members=document.getElementById("teamMembers").value.trim();
  if(!name) return;

  state.teams.push({
    id:id(),
    name,
    members: members ? members.split(",").map(x=>x.trim()) : [],
    activeTask:null,
    nextTask:null
  });

  document.getElementById("teamName").value="";
  document.getElementById("teamMembers").value="";
  save(); render();
}

function addTask(){
  const text=document.getElementById("taskName").value.trim();
  if(!text) return;

  state.unassigned.push({id:id(),text});
  document.getElementById("taskName").value="";
  save(); render();
}

/* ===== DELETE ===== */

function deleteTask(taskId){
  state.unassigned = state.unassigned.filter(t=>t.id!==taskId);

  state.teams.forEach(team=>{
    if(team.activeTask?.id===taskId) team.activeTask=null;
    if(team.nextTask?.id===taskId) team.nextTask=null;
  });

  save();
  render();
}

/* ===== EDIT ===== */

function editTeam(teamId){
  const team = state.teams.find(t=>t.id===teamId);
  if(!team) return;

  const name = prompt("Название", team.name);
  if(name===null) return;

  const members = prompt("Участники через ,", team.members.join(","));
  if(members===null) return;

  team.name=name.trim();
  team.members=members.split(",").map(x=>x.trim()).filter(Boolean);

  save();
  render();
}

/* ===== DRAG ===== */

let dragged=null;

function dragStart(type,id){
  dragged={type,id};
}

function allowDrop(e){ e.preventDefault(); }

/* ===== CORE FIX: MOVE BETWEEN ACTIVE <-> NEXT ===== */

function moveTask(teamId, targetSlot){
  if(!dragged || dragged.type!=="task") return;

  const team = state.teams.find(t=>t.id===teamId);
  if(!team) return;

  // ищем задачу везде
  let task = null;
  let from = null;

  if(team.activeTask?.id === dragged.id){
    task = team.activeTask;
    from = "activeTask";
  }
  if(team.nextTask?.id === dragged.id){
    task = team.nextTask;
    from = "nextTask";
  }

  if(!task) return;
  // убрать из старого слота
  team[from] = null;

  // поставить в новый слот
  if(targetSlot==="active") team.activeTask = task;
  if(targetSlot==="next") team.nextTask = task;

  save();
  render();
}

/* drop from pool */
function dropFromPool(teamId, slot){
  if(!dragged || dragged.type!=="task") return;

  const task = state.unassigned.find(t=>t.id===dragged.id);
  if(!task) return;

  const team = state.teams.find(t=>t.id===teamId);
  if(!team) return;

  state.unassigned = state.unassigned.filter(t=>t.id!==task.id);

  if(slot==="active") team.activeTask = task;
  if(slot==="next") team.nextTask = task;

  save();
  render();
}

/* ===== RENDER ===== */

function render(){
  const board=document.getElementById("board");

  let html="";

/* ACTIVE */
html+=`
<div class="column">
  <div class="title">Активная задача</div>

  ${state.teams.map(team=>`
    <div class="team">
      ${team.name}
      <button class="edit" onclick="editTeam('${team.id}')">✏</button>
      <button class="btn" onclick="deleteTask('${team.activeTask?.id||""}')">×</button>

      <div class="task dropzone"
        ondragover="allowDrop(event)"
        ondrop="dropFromPool('${team.id}','active')">

        ${team.activeTask ? `
          <div draggable="true"
            ondragstart="dragStart('task','${team.activeTask.id}')"
            ondragover="allowDrop(event)"
            ondrop="moveTask('${team.id}','active')">
            ${team.activeTask.text}
          </div>
        ` : "нет задачи"}
      </div>
    </div>
  `).join("")}
</div>
`;

/* TEAMS */
html+=`
<div class="column">
  <div class="title">Команды</div>

  ${state.teams.map(team=>`
    <div class="team">
      <b>${team.name}</b>
      <div style="font-size:12px;color:#555">${team.members.join(", ")||"нет"}</div>
    </div>
  `).join("")}
</div>
`;

/* NEXT */
html+=`
<div class="column">
  <div class="title">Следующая задача</div>

  ${state.teams.map(team=>`
    <div class="team">
      ${team.name}

      <div class="task dropzone"
        ondragover="allowDrop(event)"
        ondrop="dropFromPool('${team.id}','next')">

        ${team.nextTask ? `
          <div draggable="true"
            ondragstart="dragStart('task','${team.nextTask.id}')"
            ondragover="allowDrop(event)"
            ondrop="moveTask('${team.id}','next')">
            ${team.nextTask.text}
          </div>
        ` : "нет задачи"}
      </div>
    </div>
  `).join("")}
</div>
`;

/* UNASSIGNED */
html = `
<div class="column">
  <div class="title">Безхозные задачи</div>

  ${state.unassigned.map(t=>`
    <div class="task"
      draggable="true"
      ondragstart="dragStart('task','${t.id}')">
      ${t.text}
      <button class="btn" onclick="deleteTask('${t.id}')">×</button>
    </div>
  `).join("")}
</div>
` + html;

  board.innerHTML=html;
}

render();
</script>

</body>
</html>
