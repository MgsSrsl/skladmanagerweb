<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Складская доска PRO</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f4f6;
}

.toolbar{
  padding:12px;
  background:#111827;
  color:#fff;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  position:sticky;
  top:0;
}

input,button{ padding:8px; }
button{ cursor:pointer }

#board{
  display:flex;
  gap:12px;
  padding:16px;
}

.column{
  flex:1;
  background:#fff;
  border-radius:12px;
  padding:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.title{
  font-weight:bold;
  margin-bottom:10px;
  border-bottom:1px solid #ddd;
  padding-bottom:6px;
}

.task,.team{
  background:#e0f2fe;
  padding:8px;
  margin:6px 0;
  border-radius:8px;
  font-size:14px;
  position:relative;
}

.team{ background:#e5e7eb; }

.btn{
  position:absolute;
  right:6px;
  top:6px;
  border:none;
  background:#ef4444;
  color:#fff;
  border-radius:6px;
  padding:2px 6px;
  font-size:12px;
  cursor:pointer;
}

.edit{
  position:absolute;
  right:34px;
  top:6px;
  border:none;
  background:#3b82f6;
  color:#fff;
  border-radius:6px;
  padding:2px 6px;
  font-size:12px;
  cursor:pointer;
}

.dropzone{
  min-height:40px;
}

.dropzone.dragover{
  outline:2px dashed #3b82f6;
}
</style>
</head>

<body>

<div class="toolbar">
  <input id="teamName" placeholder="Команда">
  <input id="teamMembers" placeholder="Участники через ,">
  <button onclick="addTeam()">Добавить команду</button>

  <input id="taskName" placeholder="Задача">
  <button onclick="addTask()">Добавить задачу</button>
</div>

<div id="board"></div>

<script>
const STORAGE="warehouse_board_v10";

let state = JSON.parse(localStorage.getItem(STORAGE)) || {
  teams:[],
  unassigned:[]
};

function id(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2);
}

function save(){
  localStorage.setItem(STORAGE,JSON.stringify(state));
}

/* ===== CREATE ===== */

function addTeam(){
  const name=document.getElementById("teamName").value.trim();
  const members=document.getElementById("teamMembers").value.trim();
  if(!name) return;

  state.teams.push({
    id:id(),
    name,
    members: members ? members.split(",").map(x=>x.trim()) : [],
    activeTask:null,
    nextTask:null
  });

  document.getElementById("teamName").value="";
  document.getElementById("teamMembers").value="";
  save(); render();
}

function addTask(){
  const text=document.getElementById("taskName").value.trim();
  if(!text) return;

  state.unassigned.push({id:id(),text});
  document.getElementById("taskName").value="";
  save(); render();
}

/* ===== GLOBAL FIND/REMOVE ===== */

function removeFromAll(taskId){
  state.unassigned = state.unassigned.filter(t=>t.id!==taskId);

  state.teams.forEach(team=>{
    if(team.activeTask?.id===taskId) team.activeTask=null;
    if(team.nextTask?.id===taskId) team.nextTask=null;
  });
}

/* ===== DRAG CORE ===== */

let dragged=null;

function dragStart(type,id){
  dragged={type,id};
}

function allowDrop(e){ e.preventDefault(); }

/* ===== UNIVERSAL DROP ===== */

function drop(targetType, teamId, slot){

  if(!dragged) return;

  const taskId = dragged.id;

  /* 1. find task anywhere */
  let task = null;

  // unassigned
  const fromPool = state.unassigned.find(t=>t.id===taskId);
  if(fromPool){
    task = fromPool;
    state.unassigned = state.unassigned.filter(t=>t.id!==taskId);
  }

  // from teams
  state.teams.forEach(t=>{
    if(t.activeTask?.id===taskId){
      task = t.activeTask;
      t.activeTask = null;
    }
    if(t.nextTask?.id===taskId){
      task = t.nextTask;
      t.nextTask = null;
    }
  });

  if(!task) return;

  /* 2. place into target */
  if(targetType==="pool"){
    state.unassigned.push(task);
  }

  if(targetType==="team"){
    const team = state.teams.find(t=>t.id===teamId);
    if(!team) return;

    if(slot==="active") team.activeTask = task;
    if(slot==="next") team.nextTask = task;
  }

  save();
  render();
}

/* ===== TEAM OPS ===== */

function deleteTeam(id){
  state.teams = state.teams.filter(t=>t.id!==id);
  save(); render();
}

function editTeam(id){
  const t = state.teams.find(x=>x.id===id);
  if(!t) return;

  const name = prompt("Название", t.name);
  if(name===null) return;

  const members = prompt("Участники через ,", t.members.join(","));
  if(members===null) return;

  t.name=name.trim();
  t.members=members.split(",").map(x=>x.trim()).filter(Boolean);

  save(); render();
}

/* ===== RENDER ===== */

function render(){
  const board=document.getElementById("board");

  let html="";

/* ACTIVE */
html+=`
<div class="column">
  <div class="title">Активная</div>

  ${state.teams.map(team=>`
    <div class="team">
      ${team.name}
      <button class="edit" onclick="editTeam('${team.id}')">✏</button>
      <button class="btn" onclick="deleteTeam('${team.id}')">×</button>

      <div class="task dropzone"
        ondragover="allowDrop(event)"
        ondrop="drop('team','${team.id}','active')">

        ${team.activeTask ? `
          <div draggable="true"
            ondragstart="dragStart('task','${team.activeTask.id}')">
            ${team.activeTask.text}
          </div>
        ` : "нет"}
      </div>
    </div>
  `).join("")}
</div>
`;

/* TEAMS */
html+=`
<div class="column">
  <div class="title">Команды</div>

  ${state.teams.map(team=>`
    <div class="team">
      <b>${team.name}</b>
      <div style="font-size:12px;color:#555">${team.members.join(", ")||"нет"}</div>
    </div>
  `).join("")}
</div>
`;

/* NEXT */
html+=`
<div class="column">
  <div class="title">Следующая</div>

  ${state.teams.map(team=>`
    <div class="team">
      ${team.name}

      <div class="task dropzone"
        ondragover="allowDrop(event)"
        ondrop="drop('team','${team.id}','next')">

        ${team.nextTask ? `
          <div draggable="true"
            ondragstart="dragStart('task','${team.nextTask.id}')">
            ${team.nextTask.text}
          </div>
        ` : "нет"}
      </div>
    </div>
  `).join("")}
</div>
`;

/* POOL */
html = `
<div class="column">
  <div class="title">Безхозные</div>

  <div class="dropzone"
    ondragover="allowDrop(event)"
    ondrop="drop('pool')">

    ${state.unassigned.map(t=>`
      <div class="task"
        draggable="true"
        ondragstart="dragStart('task','${t.id}')">
        ${t.text}
        <button class="btn" onclick="removeFromAll('${t.id}');render()">×</button>
      </div>
    `).join("")}

  </div>
</div>
` + html;

  board.innerHTML=html;
}

render();
</script>

</body>
</html>
