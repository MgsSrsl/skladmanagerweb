<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Архив задач — Stable</title>

<style>
body{
  margin:0;
  background:#0b0f14;
  color:#fff;
  font-family:Arial;
}

header{
  position:sticky;
  top:0;
  background:#0b0f14ee;
  backdrop-filter:blur(10px);
  padding:14px;
  border-bottom:1px solid #1f2937;
}

.container{max-width:1200px;margin:auto;padding:14px}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.pills{display:flex;gap:8px;flex-wrap:wrap}

.pill{
  background:#111827;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#0f1724;
  border:1px solid #1f2937;
  color:#fff;
  border-radius:12px;
}

.day{
  margin-top:14px;
  background:#111827;
  border-radius:16px;
  overflow:hidden;
  border:1px solid #1f2937;
}

.day-h{
  padding:12px;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}

.tasks{
  display:none;
  padding:10px;
}

.tasks.open{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:10px;
}

.task{
  background:#0f1724;
  padding:12px;
  border-radius:12px;
  cursor:pointer;
}

.task:hover{background:#1f2937}

.small{color:#94a3b8;font-size:12px}
</style>

<script type="module">

import {
  initializeApp
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
  getFirestore,
  collectionGroup,
  query,
  orderBy,
  limit,
  startAfter,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "skladsborka-6c2a7.firebaseapp.com",
  projectId: "skladsborka-6c2a7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let tasksCache = [];
let lastDoc = null;
let loading = false;
let hasMore = true;

/* -------------------- GROUP -------------------- */
function groupByDate(list){
  const g = {};
  for (const t of list){
    const d = t.data || {};

    const date =
      d.date ||
      (d.createdAt?.seconds
        ? new Date(d.createdAt.seconds * 1000).toISOString().slice(0,10)
        : "Без даты");

    if (!g[date]) g[date]=[];
    g[date].push(t);
  }
  return g;
}

/* -------------------- DASHBOARD -------------------- */
function renderStats(){

  let total = tasksCache.length;
  let pickup = 0;
  let assigned = 0;
  const workers = {};

  for (const t of tasksCache){
    const d = t.data || {};

    if (d.isPickup) pickup++;
    else assigned++;

    (d.assigneeNames || []).forEach(n=>{
      workers[n]=(workers[n]||0)+1;
    });
  }

  const top = Object.entries(workers)
    .sort((a,b)=>b[1]-a[1])[0];

  document.getElementById("dash").innerHTML = `
    <div class="pill">📦 ${total}</div>
    <div class="pill">🚚 ${pickup}</div>
    <div class="pill">👷 ${assigned}</div>
    <div class="pill">🏆 ${top ? top[0]+" "+top[1] : "—"}</div>
  `;
}

/* -------------------- RENDER -------------------- */
function render(list){

  const app = document.getElementById("app");
  app.innerHTML = "";

  const grouped = groupByDate(list);
  const dates = Object.keys(grouped).sort((a,b)=>b.localeCompare(a));

  let total = 0;

  dates.forEach((date,i)=>{

    const tasks = grouped[date];
    total += tasks.length;

    app.innerHTML += `
      <div class="day">
        <div class="day-h" onclick="toggle(${i})">
          <div>${date}</div>
          <div>${tasks.length}</div>
        </div>

        <div class="tasks" id="t${i}">
          ${tasks.map(t=>`
            <div class="task" onclick="openTask('${t.id}')">
              <div>${t.data?.title || "Без названия"}</div>
              <div class="small">${t.id.slice(0,8)}</div>
            </div>
          `).join("")}
        </div>
      </div>
    `;
  });

  document.getElementById("total").textContent = "Задач: " + total;

  renderStats();
}

/* -------------------- LOAD (PAGINATION FIXED) -------------------- */
async function load(reset=true){

  if (loading) return;
  loading = true;

  if (reset){
    tasksCache = [];
    lastDoc = null;
    hasMore = true;
    document.getElementById("app").innerHTML = "Загрузка...";
  }

  let q;

  if (!lastDoc){
    q = query(
      collectionGroup(db,"tasks"),
      orderBy("createdAt","desc"),
      limit(40)
    );
  } else {
    q = query(
      collectionGroup(db,"tasks"),
      orderBy("createdAt","desc"),
      startAfter(lastDoc),
      limit(40)
    );
  }

  const snap = await getDocs(q);

  if (snap.empty){
    hasMore = false;
    loading = false;
    render(tasksCache);
    return;
  }

  lastDoc = snap.docs[snap.docs.length - 1];

  snap.forEach(d=>{
    tasksCache.push({
      id: d.id,
      data: d.data()
    });
  });

  render(tasksCache);

  loading = false;
}

/* -------------------- UI -------------------- */
window.toggle = (i)=>{
  document.getElementById("t"+i).classList.toggle("open");
};

window.openTask = (id)=>{
  const t = tasksCache.find(x=>x.id===id);
  alert(JSON.stringify(t.data,null,2));
};

/* -------------------- SEARCH -------------------- */
window.search = (v)=>{

  v = v.toLowerCase();

  if (!v) return render(tasksCache);

  const filtered = tasksCache.filter(t=>{
    const d = t.data || {};
    return (
      (d.title||"") + " " +
      (d.description||"") + " " +
      t.id
    ).toLowerCase().includes(v);
  });

  render(filtered);
};

/* -------------------- SCROLL -------------------- */
window.addEventListener("scroll",()=>{
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 600){
    if (hasMore && !loading){
      load(false);
    }
  }
});

window.onload = load;

</script>

</head>

<body>

<header>
  <div class="top">
    <div>📦 Архив задач</div>

    <div class="pills">
      <div class="pill" id="total">0</div>
      <div class="pill" id="dash"></div>
    </div>
  </div>
</header>

<div class="container">

<input placeholder="поиск..." oninput="search(this.value)">

<div id="app"></div>

</div>

</body>
</html>
