<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Архив MAX — СкладСборка</title>

<style>
body{
  margin:0;
  background:#0b0f14;
  color:#fff;
  font-family:Arial;
}

header{
  position:sticky;
  top:0;
  background:#0b0f14ee;
  backdrop-filter:blur(10px);
  padding:14px;
  border-bottom:1px solid #1f2937;
}

.container{max-width:1200px;margin:auto;padding:14px}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
}

.pills{display:flex;gap:8px;flex-wrap:wrap}

.pill{
  background:#111827;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#0f1724;
  border:1px solid #1f2937;
  color:#fff;
  border-radius:12px;
}

.day{
  margin-top:14px;
  background:#111827;
  border-radius:16px;
  overflow:hidden;
  border:1px solid #1f2937;
}

.day-h{
  padding:12px;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}

.tasks{
  display:none;
  padding:10px;
}

.tasks.open{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:10px;
}

.task{
  background:#0f1724;
  padding:12px;
  border-radius:12px;
  cursor:pointer;
}

.task:hover{background:#1f2937}

.small{color:#94a3b8;font-size:12px}
</style>

<script type="module">

import {
  initializeApp
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
  getFirestore,
  collectionGroup,
  query,
  orderBy,
  limit,
  startAfter,
  getDocs,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "skladsborka-6c2a7.firebaseapp.com",
  projectId: "skladsborka-6c2a7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cache = [];
let grouped = {};
let lastDoc = null;
let loading = false;
let hasMore = true;

const el = id => document.getElementById(id);

function groupTasks(tasks){

  const g = {};

  for (const t of tasks){

    const d = t.data;

    const date =
      d.date ||
      (d.createdAt?.seconds
        ? new Date(d.createdAt.seconds*1000).toISOString().slice(0,10)
        : "no-date");

    if (!g[date]) g[date]=[];
    g[date].push(t);
  }

  return g;
}

function stats(){

  let total = cache.length;
  let pickup = 0;
  let assigned = 0;

  const workers = {};

  cache.forEach(t=>{
    const d = t.data;

    if (d.isPickup) pickup++;
    else assigned++;

    (d.assigneeNames||[]).forEach(n=>{
      workers[n]=(workers[n]||0)+1;
    });
  });

  const top = Object.entries(workers)
    .sort((a,b)=>b[1]-a[1])[0];

  el("dash").innerHTML = `
    <div class="pill">📦 ${total}</div>
    <div class="pill">🚚 ${pickup}</div>
    <div class="pill">👷 ${assigned}</div>
    <div class="pill">🏆 ${top?top[0]+" "+top[1]:"—"}</div>
  `;
}

function render(data){

  const app = el("app");
  app.innerHTML="";

  const dates = Object.keys(data).sort((a,b)=>b.localeCompare(a));

  dates.forEach((d,i)=>{

    const tasks = data[d];

    let html="";

    tasks.forEach(t=>{
      html += `
        <div class="task" onclick="openTask('${t.id}')">
          ${t.data.title||"no title"}
          <div class="small">${t.id.slice(0,8)}</div>
        </div>
      `;
    });

    app.innerHTML += `
      <div class="day">
        <div class="day-h" onclick="toggle(${i})">
          <div>${d}</div>
          <div>${tasks.length}</div>
        </div>
        <div class="tasks" id="t${i}">
          ${html}
        </div>
      </div>
    `;
  });

  stats();
}

async function load(reset=true){

  if (loading) return;
  loading=true;

  if (reset){
    cache=[];
    grouped={};
    lastDoc=null;
    hasMore=true;
  }

  let q;

  if (!lastDoc){
    q = query(
      collectionGroup(db,"tasks"),
      orderBy("createdAt","desc"),
      limit(40)
    );
  } else {
    q = query(
      collectionGroup(db,"tasks"),
      orderBy("createdAt","desc"),
      startAfter(lastDoc),
      limit(40)
    );
  }

  const snap = await getDocs(q);

  if (snap.empty){
    hasMore=false;
    loading=false;
    return;
  }

  lastDoc = snap.docs.at(-1);

  snap.forEach(d=>{
    const data=d.data();

    const task={
      id:d.id,
      data,
      searchIndex:(
        (data.title||"")+" "+
        (data.description||"")
      ).toLowerCase()
    };

    cache.push(task);
  });

  grouped = groupTasks(cache);

  render(grouped);

  loading=false;
}

window.toggle = (i)=>{
  el("t"+i).classList.toggle("open");
};

window.openTask = (id)=>{
  const t = cache.find(x=>x.id===id);
  alert(JSON.stringify(t.data,null,2));
};

window.search = (v)=>{

  v=v.toLowerCase();

  if (!v) return render(grouped);

  const filtered={};

  for (const t of cache){

    if ((t.searchIndex||"").includes(v)){

      const d = t.data;
      const date = d.date || "no-date";

      if (!filtered[date]) filtered[date]=[];
      filtered[date].push(t);
    }
  }

  render(filtered);
};

window.addEventListener("scroll",()=>{
  if (window.innerHeight+window.scrollY > document.body.offsetHeight-500){
    if (hasMore) load(false);
  }
});

/* 🔥 REALTIME */
onSnapshot(collectionGroup(db,"tasks"), snap=>{
  snap.docChanges().forEach(ch=>{
    if (ch.type==="added"){
      // можно расширить позже
    }
  });
});

window.onload = load;

</script>

</head>

<body>

<header>
  <div class="top">
    <div>📦 ARCHIVE MAX</div>
    <div class="pills" id="dash"></div>
  </div>
</header>

<div class="container">

<input placeholder="поиск..." oninput="search(this.value)">

<div id="app"></div>

</div>

</body>
</html>
