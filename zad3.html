<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Складская доска</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f4f6;
}

.toolbar{
  padding:12px;
  background:#111827;
  color:#fff;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  position:sticky;
  top:0;
}

input,button{
  padding:8px;
}

button{cursor:pointer}

#board{
  display:flex;
  gap:12px;
  padding:16px;
}

/* колонки */
.column{
  flex:1;
  background:#fff;
  border-radius:12px;
  padding:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
  min-height:300px;
}

.title{
  font-weight:bold;
  margin-bottom:10px;
  border-bottom:1px solid #ddd;
  padding-bottom:6px;
}

/* карточки */
.task, .team{
  background:#e0f2fe;
  padding:8px;
  margin:6px 0;
  border-radius:8px;
  cursor:grab;
  font-size:14px;
}

.team{
  background:#e5e7eb;
}

.small{
  font-size:12px;
  color:#555;
  margin-top:4px;
}

.unassigned{
  margin-bottom:12px;
  padding:10px;
  border-radius:12px;
  background:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.dropzone.dragover{
  outline:2px dashed #3b82f6;
}

</style>
</head>

<body>

<div class="toolbar">
  <input id="teamName" placeholder="Команда">
  <input id="teamMembers" placeholder="Участники (через ,)">
  <button onclick="addTeam()">Добавить команду</button>

  <input id="taskName" placeholder="Задача">
  <button onclick="addTask()">Добавить задачу</button>
</div>

<div id="board"></div>

<script>
const STORAGE="warehouse_board_v4";

let state = JSON.parse(localStorage.getItem(STORAGE)) || {
  teams:[],
  unassigned:[]
};

function id(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2);
}

function save(){
  localStorage.setItem(STORAGE,JSON.stringify(state));
}

/* ===== TEAM ===== */

function addTeam(){
  const name = document.getElementById("teamName").value.trim();
  const members = document.getElementById("teamMembers").value.trim();
  if(!name) return;

  state.teams.push({
    id:id(),
    name,
    members: members ? members.split(",").map(x=>x.trim()) : [],
    activeTask:null,
    nextTask:null
  });

  document.getElementById("teamName").value="";
  document.getElementById("teamMembers").value="";

  save();
  render();
}

/* ===== TASK ===== */

function addTask(){
  const text = document.getElementById("taskName").value.trim();
  if(!text) return;

  state.unassigned.push({id:id(), text});
  document.getElementById("taskName").value="";

  save();
  render();
}

/* ===== DRAG ===== */

let dragged = null;

function dragStart(type,id){
  dragged = {type,id};
}

function allowDrop(e){
  e.preventDefault();
}

/* drop task -> team */
function dropToTeam(teamId){
  if(!dragged || dragged.type!=="task") return;

  const task = state.unassigned.find(t=>t.id===dragged.id);
  if(!task) return;

  const team = state.teams.find(t=>t.id===teamId);
  if(!team) return;

  state.unassigned = state.unassigned.filter(t=>t.id!==task.id);

  if(!team.activeTask){
    team.activeTask = task;
  }else if(!team.nextTask){
    team.nextTask = task;
  }else{
    // если оба заняты — кладём в next (перезапись запрещена тут)
    team.nextTask = task;
  }

  save();
  render();
}

/* ===== RENDER ===== */

function render(){
  const board=document.getElementById("board");

  let html="";

  /* LEFT: ACTIVE */
  html+=`
  <div class="column">
    <div class="title">Активная задача</div>

    ${state.teams.map(team=>`
      <div class="team">
        <b>${team.name}</b>
        <div class="task dropzone"
          ondragover="allowDrop(event)"
          ondrop="dropToTeam('${team.id}')">

          ${team.activeTask ? team.activeTask.text : "нет задачи"}

        </div>
      </div>
    `).join("")}
  </div>
  `;

  /* MIDDLE: TEAMS */
  html+=`
  <div class="column">
    <div class="title">Команды</div>

    ${state.teams.map(team=>`
      <div class="team">
        <b>${team.name}</b>
        <div class="small">
        ${team.members.join(", ") || "нет участников"}
        </div>
      </div>
    `).join("")}
  </div>
  `;

  /* RIGHT: NEXT */
  html+=`
  <div class="column">
    <div class="title">Следующая задача</div>

    ${state.teams.map(team=>`
      <div class="team">
        <b>${team.name}</b>
        <div class="task dropzone"
          ondragover="allowDrop(event)"
          ondrop="dropToTeam('${team.id}')">

          ${team.nextTask ? team.nextTask.text : "нет задачи"}

        </div>
      </div>
    `).join("")}
  </div>
  `;

  /* UNASSIGNED (отдельно сверху) */
  html = `
  <div class="unassigned">
    <b>Безхозные задачи</b>
    ${state.unassigned.map(t=>`
      <div class="task"
        draggable="true"
        ondragstart="dragStart('task','${t.id}')">
        ${t.text}
      </div>
    `).join("")}
  </div>
  ` + html;

  board.innerHTML = html;
}

render();
</script>

</body>
</html>
