<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Складская доска</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f4f6;
}

.toolbar{
  padding:12px;
  background:#111827;
  color:#fff;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  position:sticky;
  top:0;
}

input,button{ padding:8px; }
button{ cursor:pointer }

#board{
  display:flex;
  gap:12px;
  padding:16px;
}

.column{
  flex:1;
  background:#fff;
  border-radius:12px;
  padding:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.title{
  font-weight:bold;
  margin-bottom:10px;
  border-bottom:1px solid #ddd;
  padding-bottom:6px;
}

.task,.team{
  background:#e0f2fe;
  padding:8px;
  margin:6px 0;
  border-radius:8px;
  font-size:14px;
  position:relative;
}

.team{ background:#e5e7eb; }

.small{
  font-size:12px;
  color:#555;
}

.del{
  position:absolute;
  right:6px;
  top:6px;
  border:none;
  background:#ef4444;
  color:#fff;
  border-radius:6px;
  padding:2px 6px;
  font-size:12px;
  cursor:pointer;
}

.unassigned{
  margin:16px;
  padding:10px;
  background:#fff;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
</style>
</head>

<body>

<div class="toolbar">
  <input id="teamName" placeholder="Команда">
  <input id="teamMembers" placeholder="Участники через ,">
  <button onclick="addTeam()">Добавить команду</button>

  <input id="taskName" placeholder="Задача">
  <button onclick="addTask()">Добавить задачу</button>
</div>

<div id="board"></div>

<script>
const STORAGE="warehouse_board_v5";

let state = JSON.parse(localStorage.getItem(STORAGE)) || {
  teams:[],
  unassigned:[]
};

function id(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2);
}

function save(){
  localStorage.setItem(STORAGE,JSON.stringify(state));
}

/* ===== ADD ===== */

function addTeam(){
  const name=document.getElementById("teamName").value.trim();
  const members=document.getElementById("teamMembers").value.trim();
  if(!name) return;

  state.teams.push({
    id:id(),
    name,
    members: members ? members.split(",").map(x=>x.trim()) : [],
    activeTask:null,
    nextTask:null
  });

  document.getElementById("teamName").value="";
  document.getElementById("teamMembers").value="";
  save(); render();
}

function addTask(){
  const text=document.getElementById("taskName").value.trim();
  if(!text) return;

  state.unassigned.push({id:id(),text});
  document.getElementById("taskName").value="";
  save(); render();
}

/* ===== DELETE ===== */

function deleteTask(id){
  state.unassigned = state.unassigned.filter(t=>t.id!==id);

  state.teams.forEach(t=>{
    if(t.activeTask?.id===id) t.activeTask=null;
    if(t.nextTask?.id===id) t.nextTask=null;
  });

  save(); render();
}

function deleteTeam(id){
  state.teams = state.teams.filter(t=>t.id!==id);
  save(); render();
}

/* ===== DRAG ===== */

let dragged=null;

function dragStart(type,id){
  dragged={type,id};
}

function allowDrop(e){ e.preventDefault(); }

function dropToTeam(teamId){
  if(!dragged || dragged.type!=="task") return;

  const task=state.unassigned.find(t=>t.id===dragged.id);
  if(!task) return;

  const team=state.teams.find(t=>t.id===teamId);
  if(!team) return;

  state.unassigned = state.unassigned.filter(t=>t.id!==task.id);

  if(!team.activeTask) team.activeTask=task;
  else team.nextTask=task;

  save(); render();
}

/* ===== RENDER ===== */

function render(){
  const board=document.getElementById("board");

  let html="";

  html+=`
  <div class="column">
    <div class="title">Активная задача</div>
    ${state.teams.map(team=>`
      <div class="team">
        ${team.name}
        <button class="del" onclick="deleteTeam('${team.id}')">×</button>

        <div class="task" ondragover="allowDrop(event)" ondrop="dropToTeam('${team.id}')">
          ${team.activeTask ? team.activeTask.text : "нет задачи"}
        </div>
      </div>
    `).join("")}
    </div>
  `;

  html+=`
  <div class="column">
    <div class="title">Команды</div>
    ${state.teams.map(team=>`
      <div class="team">
        <b>${team.name}</b>
        <div class="small">${team.members.join(", ")||"нет участников"}</div>
      </div>
    `).join("")}
  </div>
  `;

  html+=`
  <div class="column">
    <div class="title">Следующая задача</div>
    ${state.teams.map(team=>`
      <div class="team">
        ${team.name}
        <div class="task" ondragover="allowDrop(event)" ondrop="dropToTeam('${team.id}')">
          ${team.nextTask ? team.nextTask.text : "нет задачи"}
        </div>
      </div>
    `).join("")}
  </div>
  `;

  html = `
  <div class="unassigned">
    <b>Безхозные задачи</b>
    ${state.unassigned.map(t=>`
      <div class="task"
        draggable="true"
        ondragstart="dragStart('task','${t.id}')">
        ${t.text}
        <button class="del" onclick="deleteTask('${t.id}')">×</button>
      </div>
    `).join("")}
  </div>
  ` + html;

  board.innerHTML=html;
}

render();
</script>

</body>
</html>
